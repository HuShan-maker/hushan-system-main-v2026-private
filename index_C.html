<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>C - Dashboard Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 30px; background: #f2f2f7; color: #000; }
        h1 { font-weight: 900; font-size: 32px; letter-spacing: -1px; margin-bottom: 30px; }
        #monitorList { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; display: flex; justify-content: space-between; align-items: center; border-left: 12px solid #ccc; box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .orange { border-left-color: #ff9500; animation: pulseO 2s infinite; }
        .red { border-left-color: #ff3b30; }
        @keyframes pulseO { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .linea-name { font-size: 28px; font-weight: 900; }
        .status-label { font-size: 14px; font-weight: 800; color: #8e8e93; text-transform: uppercase; margin-top: 5px; }
        .timer { font-size: 24px; font-weight: 900; color: #333; text-align: right; }
        .no-data { font-size: 18px; color: #8e8e93; font-weight: 600; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>MONITOR LINEE</h1>
    <div id="monitorList">Caricamento in corso...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 监听数据库
    db.ref('active_calls').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const container = document.getElementById('monitorList');
        container.innerHTML = '';

        const ids = Object.keys(data);
        if(ids.length === 0) {
            container.innerHTML = `<div class="no-data">✅ TUTTE LE LINEE SONO IN FUNZIONE</div>`;
            return;
        }

        ids.forEach(id => {
            const item = data[id];
            const startTime = item.status === 'red' ? (item.startD || item.startA) : item.startA;
            const elapsed = Math.round((Date.now() - startTime) / 60000);
            
            const card = document.createElement('div');
            card.className = `card ${item.status}`;
            card.innerHTML = `
                <div>
                    <div class="linea-name">${id}</div>
                    <div class="status-label">${item.status === 'orange' ? 'In Attesa' : 'In Riparazione'}</div>
                </div>
                <div>
                    <div class="timer">${elapsed} min</div>
                </div>
            `;
            container.appendChild(card);
        });
    });

    // 每分钟刷新一次时间显示
    setInterval(() => { location.reload(); }, 60000);
</script>
</body>
</html>
