<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Tabellone v8.8.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f2f2f7; --red: #ff3b30; --orange: #ff9500; --black: #000000; --white: #ffffff; --text-main: #1c1c1e; --text-sec: #8e8e93; --blue: #007aff; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 0 20px 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; flex-shrink: 0; }
        .title-area h1 { font-size: 20px; font-weight: 900; margin: 0; letter-spacing: -0.5px; text-transform: uppercase; }
        
        .turno-badge { 
            font-size: 11px; font-weight: 800; color: #8e8e93; 
            background: #e5e5ea; padding: 3px 10px; border-radius: 8px; 
            margin-top: 4px; text-transform: uppercase; display: inline-block;
        }

        .reg-btn { background: #000; color: #fff; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        #activeList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 15px; align-items: center; }

        .card { 
            background: var(--white); border-radius: 20px; padding: 15px 18px;
            display: flex; align-items: center; 
            width: 100%; max-width: 650px; min-height: 95px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 2px solid transparent;
            position: relative; transition: 0.3s;
        }
        .card.st-waiting { border-color: var(--orange); }
        .card.st-working { border-color: var(--red); }
        .card.st-completed { border-color: var(--black); }
        
        /* 修改点 1: CSS 类名改为两个 L 确保匹配 */
        .card.st-annullato { 
            min-height: 55px !important; 
            background: #e5e5ea !important; 
            border: 1px solid #d1d1d6 !important; 
            opacity: 1 !important; 
            color: #1c1c1e !important;
            box-shadow: none !important;
        }

        .card-left { display: flex; flex-direction: column; gap: 6px; flex: 0.7; min-width: 80px; justify-content: center; align-items: flex-start; }
        .card-badge { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 5px; text-transform: uppercase; color: #fff; letter-spacing: 0.3px; white-space: nowrap; }
        .bg-orange { background-color: var(--orange); }
        .bg-red { background-color: var(--red); }
        .bg-black { background-color: var(--black); }

        .card-linea { font-size: 22px; font-weight: 700; color: var(--text-main); line-height: 1; margin-left: 2px; }

        .card-center { flex: 2; padding-left: 10px; display: flex; flex-direction: column; gap: 3px; justify-content: center; border-right: 1px solid #f2f2f7; }
        .card-stats { font-size: 12px; font-weight: 500; color: var(--text-sec); line-height: 1.4; white-space: nowrap; }
        .card-stats b { color: #000; font-weight: 600; }

        .card-right { flex: 0.6; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-left: 10px; min-width: 70px; }
        .total-label { font-size: 8px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; margin-bottom: 2px; }
        .total-val { font-size: 18px; font-weight: 700; color: var(--black); line-height: 1; }

        .timeout-critical { animation: pulseWarning 0.8s infinite; border-color: var(--orange) !important; background: #fff9f0; }
        @keyframes pulseWarning { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .home-footer { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; flex-shrink: 0; }

        #historyPage, #feedbackPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 500; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .v-nav { display: flex; align-items: center; justify-content: space-between; height: 55px; padding: 0 20px; border-bottom: 1px solid #f2f2f7; flex-shrink: 0; }
        #logContainer, #feedbackContainer { flex: 1; overflow-y: auto; padding: 15px; }
        
        .fb-card { background: #f9f9fb; border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1.5px solid var(--black); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .fb-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .fb-name { font-size: 15px; font-weight: 800; color: var(--black); }
        .fb-score { font-size: 12px; font-weight: 700; color: var(--orange); }
        .fb-msg { font-size: 13px; color: var(--text-main); line-height: 1.5; background: #fff; padding: 12px; border-radius: 12px; border: 1px solid #f2f2f7; font-style: italic; }
        .fb-meta { font-size: 10px; color: var(--text-sec); margin-top: 10px; text-transform: uppercase; font-weight: 700; display: flex; justify-content: space-between; }

        .day-header { background: #f2f2f7; padding: 12px 15px; font-size: 13px; font-weight: 700; border-radius: 12px; margin-top: 10px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .day-stats-box { font-size: 10px; color: var(--text-sec); display: flex; gap: 8px; }
        .day-stats-box b { color: var(--black); }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 10px 2px; text-align: center; font-size: 11px; border-bottom: 1px solid #f2f2f7; vertical-align: middle; }
        th { font-weight: 700; color: var(--text-sec); text-transform: uppercase; font-size: 9px; }
        .tech-cell { font-size: 10px; font-weight: 600; color: var(--text-main); word-break: break-all; }

        .fb-read-btn {
            background: #e5e5ea; color: #000; border: none; padding: 12px 25px;
            border-radius: 20px; font-weight: 800; font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .fb-read-btn:active { transform: scale(0.95); opacity: 0.7; }

        .fb-clear-btn {
            width: 60%; 
            max-width: 160px; 
            padding: 10px; 
            border-radius: 12px; 
            border: none; 
            background: #e5e5ea; 
            color: #000000; 
            font-weight: 800; 
            font-size: 11px;
            text-transform: uppercase; 
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 60px; 
        }

        .history-footer { padding: 15px; display: flex; justify-content: center; border-top: 1px solid #f2f2f7; background: #fff; }
        .btn-clear-old {
            background: #fff; color: var(--red); border: 1.5px solid var(--red); 
            padding: 10px 20px; border-radius: 12px; font-weight: 800; 
            font-size: 11px; text-transform: uppercase; cursor: pointer;
        }

        .footer-text { text-align: center; padding: 5px 0 10px 0; font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-area">
            <h1>STATO INTERVENTI</h1>
            <div id="turnoDisp" class="turno-badge">--</div>
        </div>
        <button class="reg-btn" onclick="showHistory()">Archivio</button>
    </div>

    <div id="activeList"></div>

    <div class="home-footer">
        <button class="fb-read-btn" onclick="showFeedback()">Leggi Feedback 🎓</button>
        <div class="footer-text">© <span id="curYear"></span> HU SHAN · ALL RIGHTS RESERVED</div>
    </div>

    <div id="historyPage">
        <div class="v-nav">
            <div style="font-size:28px; cursor:pointer" onclick="closeHistory()">←</div>
            <h2 style="font-size:15px; font-weight:700; margin:0;">RECORD LOCALI</h2>
            <div style="width:28px"></div>
        </div>
        <div id="logContainer"></div>
        <div class="history-footer">
            <button class="btn-clear-old" onclick="clearOldRecords()">SVUOTA RECORD VECCHI</button>
        </div>
    </div>

    <div id="feedbackPage">
        <div class="v-nav">
            <div style="font-size:28px; cursor:pointer" onclick="closeFeedback()">←</div>
            <h2 style="font-size:15px; font-weight:700; margin:0;">CRESCITA TECNICA</h2>
            <div style="width:28px"></div>
        </div>
        <div id="feedbackContainer"></div>
        <div style="padding:15px 15px 0 15px; display: flex; justify-content: center;">
            <button class="fb-clear-btn" onclick="clearFeedback()">SVUOTA FEEDBACK</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let logs = JSON.parse(localStorage.getItem('c_local_v89') || '[]');
    let dayHistory = JSON.parse(localStorage.getItem('c_days_v89') || '[]');
    let feedbackLogs = JSON.parse(localStorage.getItem('c_feedback_v89') || '[]');
    let processedStarts = new Set(logs.map(l => l.st));
    let cloudData = {};

    function showHistory() { document.getElementById('historyPage').style.display = 'flex'; renderLogs(); }
    function closeHistory() { 
        document.getElementById('historyPage').style.display = 'none'; 
        document.getElementById('feedbackPage').style.display = 'none'; 
    }
    function showFeedback() { document.getElementById('feedbackPage').style.display = 'flex'; renderFeedback(); }
    function closeFeedback() { document.getElementById('feedbackPage').style.display = 'none'; }

    function cleanCloudHistory() {
        const todayStr = new Date().toISOString().split('T')[0];
        const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const keepDays = [todayStr, yesterdayStr];
        const lockRef = db.ref('maintenance/lastCleanDate');
    
        lockRef.transaction((currentValue) => {
            if (currentValue === todayStr) return; 
            return todayStr;
        }, (error, committed) => {
            if (committed) {
                console.log("Primo avvio rilevato. Pulizia Firebase in corso...");
    
                // 1. 清理云端 2 天前的历史记录 (history)
                db.ref('history').once('value').then(snap => {
                    const allHistory = snap.val();
                    if (allHistory) {
                        Object.keys(allHistory).forEach(dateFolder => {
                            if (!keepDays.includes(dateFolder)) {
                                db.ref(`history/${dateFolder}`).remove();
                            }
                        });
                    }
                });
    
                // 2. 清理云端 2 天前的反馈记录 (feedbacks)
                db.ref('feedbacks').once('value').then(fbSnap => {
                    const allFb = fbSnap.val();
                    if (allFb) {
                        Object.keys(allFb).forEach(key => {
                            const fbDateStr = allFb[key].data; 
                            if (fbDateStr !== todayStr && fbDateStr !== yesterdayStr) {
                                db.ref(`feedbacks/${key}`).remove();
                            }
                        });
                    }
                });
            }
        });
    }
    
    // 实时同步：获取当天已完成的任务并存入本地 Archivio
    db.ref('history/' + new Date().toISOString().split('T')[0]).on('child_added', (snapshot) => {
        const item = snapshot.val();
        if (item && item.status === 'completed' && !processedStarts.has(item.startA)) {
            const entry = {
                i: item.id || snapshot.key.split('_')[0],
                day: new Date(item.startA).toLocaleDateString('it-IT'),
                s: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                tA: Math.round(((item.startD || item.startA) - item.startA) / 60000),
                tD: Math.round(((item.endT || Date.now()) - (item.startD || item.startA)) / 60000),
                st: item.startA, 
                et: item.endT || Date.now(),
                c: item.causale || "-",
                tech: item.techName || "-",
                t: item.turno || calculateTurnoByTimestamp(item.startA)
            };
            logs.push(entry);
            processedStarts.add(item.startA);
            if (!dayHistory.includes(entry.day)) dayHistory.push(entry.day);
            saveState();
            renderCombinedCards();
            if(document.getElementById('historyPage').style.display === 'flex') renderLogs();
        }
    });


    function autoCleanOldRecords() {
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        const thirtyMs = thirtyDaysAgo.getTime();
        let needsSave = false;
        dayHistory = dayHistory.filter(dayStr => {
            const [d, m, y] = dayStr.split('/');
            const recordDate = new Date(y, m - 1, d);
            if (recordDate < thirtyDaysAgo) { logs = logs.filter(l => l.day !== dayStr); needsSave = true; return false; }
            return true;
        });
        const fbLen = feedbackLogs.length;
        feedbackLogs = feedbackLogs.filter(f => f.timestamp > thirtyMs);
        if(fbLen !== feedbackLogs.length) needsSave = true;
        if (needsSave) { processedStarts = new Set(logs.map(l => l.st)); saveState(); }
    }
    autoCleanOldRecords();

    function calculateTurnoByTimestamp(ts) {
        const date = new Date(ts);
        const hour = date.getHours() + (date.getMinutes() / 60);
        const baseDate = new Date(2025, 11, 29); 
        const totalWeeks = Math.floor((date - baseDate) / (7*24*60*60*1000)) + 1;
        const isSingleWeek = totalWeeks % 2 !== 0; 
        const isAfternoon = (hour >= 14.25); 
        return isSingleWeek ? (isAfternoon ? "Turno A" : "Turno B") : (isAfternoon ? "Turno B" : "Turno A");
    }

    // --- 新代码（替换上去） ---
db.ref('feedbacks').on('child_added', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        // 重要逻辑：检查本地是否已经存过这条反馈（通过时间戳判断）
        const alreadyExists = feedbackLogs.some(f => f.timestamp === data.timestamp);
        
        if (!alreadyExists) {
            feedbackLogs.unshift(data); 
            
            // 保持本地 30 天自动清理逻辑，防止手机内存爆掉
            const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            feedbackLogs = feedbackLogs.filter(f => (f.timestamp || 0) > thirtyDaysAgo);
            
            localStorage.setItem('c_feedback_v89', JSON.stringify(feedbackLogs));
            
            // 如果用户正开着 Feedback 页面，立即刷新显示
            if(document.getElementById('feedbackPage').style.display === 'flex') renderFeedback();
        }
    }
});


    function getRealTimeTurno() {
        return calculateTurnoByTimestamp(Date.now());
    }

    function updateHeaderTurno() { document.getElementById('turnoDisp').innerText = getRealTimeTurno(); }
    updateHeaderTurno(); setInterval(updateHeaderTurno, 60000);

    db.ref('active_calls').on('value', (snapshot) => {
        cloudData = snapshot.val() || {};
        const currentTurno = getRealTimeTurno();
        const todayStr = new Date().toLocaleDateString('it-IT');
        let needsSave = false;

        Object.keys(cloudData).forEach(id => {
            const item = cloudData[id];
            const taskTurno = item.turno || calculateTurnoByTimestamp(item.startA);
            const taskDay = new Date(item.startA).toLocaleDateString('it-IT');

            if (taskTurno !== currentTurno || taskDay !== todayStr) {
                item.status = 'completed';
                item.causale = "CHIUSURA TURNO";
                item.techName = "SISTEMA";
                item.endT = Date.now();
                item.hideFromBoard = true; 
                db.ref('active_calls/' + id).remove(); 
            }

            if (item.status === 'completed' && !processedStarts.has(item.startA)) {
                archiveTask(id, item); needsSave = true;
            }
        });
        if(needsSave) saveState();
        renderCombinedCards();
        if(document.getElementById('historyPage').style.display === 'flex') renderLogs();
    });

    function archiveTask(id, item) {
        let startD = item.startD || item.startA;
        let endT = item.endT || Date.now();
        const newEntry = {
            i: id, day: new Date(item.startA).toLocaleDateString('it-IT'),
            s: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            tA: Math.round((startD - item.startA) / 60000),
            tD: Math.round((endT - startD) / 60000),
            st: item.startA, et: endT,
            c: item.causale || "-",
            tech: item.techName || item.takenBy || "-",
            t: item.turno || calculateTurnoByTimestamp(item.startA),
            hideFromBoard: item.hideFromBoard || false
        };
        logs.push(newEntry); processedStarts.add(item.startA);
        if (!dayHistory.includes(newEntry.day)) dayHistory.push(newEntry.day);
        db.ref('active_calls/' + id).remove();
    }

    function saveState() {
        localStorage.setItem('c_local_v89', JSON.stringify(logs));
        localStorage.setItem('c_days_v89', JSON.stringify(dayHistory));
        localStorage.setItem('c_feedback_v89', JSON.stringify(feedbackLogs));
    }

    function renderCombinedCards() {
        const list = document.getElementById('activeList'); list.innerHTML = '';
        const now = Date.now(); const todayStr = new Date().toLocaleDateString('it-IT');
        const currentTurno = getRealTimeTurno();

        const uniqueItemsMap = new Map();

        const cloudItems = Object.keys(cloudData).filter(id => {
            const item = cloudData[id];
            const tDay = new Date(item.startA).toLocaleDateString('it-IT');
            const tTurno = item.turno || calculateTurnoByTimestamp(item.startA);
            return tDay === todayStr && tTurno === currentTurno && !item.hideFromBoard;
        }).forEach(id => {
            const item = cloudData[id];
            uniqueItemsMap.set(item.startA, { id: id, ...item, isLocal: false, sortTime: (item.status === 'orange') ? item.startA : (item.startB || item.startA), startTimeStr: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        });

        logs.filter(l => l.day === todayStr && l.t === currentTurno && !l.hideFromBoard).forEach(l => {
            if (!uniqueItemsMap.has(l.st)) {
                uniqueItemsMap.set(l.st, { id: l.i, status: 'completed', startA: l.st, endT: l.et, causale: l.c, techName: l.tech, tA: l.tA, tD: l.tD, isLocal: true, sortTime: l.et || l.st, startTimeStr: l.s });
            }
        });

        const all = Array.from(uniqueItemsMap.values()).sort((a, b) => {
            const aAnn = String(a.causale).toUpperCase().includes("ANNULL"); 
            const bAnn = String(b.causale).toUpperCase().includes("ANNULL");
            if (aAnn && !bAnn) return 1; if (!aAnn && bAnn) return -1;
            
            const bTo = (!b.isLocal && b.status === 'orange' && Math.round((now - b.startA) / 60000) >= 15);
            const aTo = (!a.isLocal && a.status === 'orange' && Math.round((now - a.startA) / 60000) >= 15);
            if (aTo && !bTo) return -1; if (!aTo && bTo) return 1;
            return b.sortTime - a.sortTime;
        });

        all.forEach(item => {
            const isAnnulato = String(item.causale).toUpperCase().includes("ANNULL");
            let waitMin = item.isLocal ? item.tA : Math.round((now-item.startA)/60000);
            let workMin = item.isLocal ? item.tD : (item.startB ? Math.round((now-item.startB)/60000) : 0);
            let statusL, colorC, statusK;
            if(item.status === 'orange') { statusL = 'ATTESA'; colorC = 'orange'; statusK = 'waiting'; }
            else if(item.status === 'red' || item.status === 'finishing') { statusL = 'LAVORO'; colorC = 'red'; statusK = 'working'; }
            else { statusL = 'FINE'; colorC = 'black'; statusK = 'completed'; }
            
            const card = document.createElement('div');
            card.className = `card st-${isAnnulato ? 'annullato' : statusK}`;
            if(!item.isLocal && item.status === 'orange' && waitMin >= 15) card.classList.add('timeout-critical');
            
            if (isAnnulato) {
                card.innerHTML = `<div class="card-left"><div class="card-linea" style="color:#000;">${item.id}</div></div>
                    <div class="card-center" style="border:none; text-align: center;"><div style="font-size: 11px; font-weight: 800; color:#000;">ANNULLATO DA OPERATORE</div></div>
                    <div class="card-right" style="min-width: 50px;"><div style="font-size: 10px; color: #8e8e93; font-weight:700;">${item.startTimeStr}</div></div>`;
            } else {
                card.innerHTML = `<div class="card-left"><div class="card-badge bg-${colorC}">${statusL}</div><div class="card-linea" style="margin-bottom: 20px;">${item.id}</div></div>
                    <div class="card-center"><div class="card-stats">Inizio: <b>${item.startTimeStr}</b><br>Attesa: <b>${waitMin}m</b> | Durata: <b>${workMin}m</b><br>Causale: <b>${item.causale||"-"}</b><br>Tecnico: <b>${item.techName||"-"}</b></div></div>
                    <div class="card-right"><div class="total-label">Totale</div><div class="total-val">${waitMin+workMin}m</div></div>`;
            }
            list.appendChild(card);
        });
    }

    function renderLogs() {
        const container = document.getElementById('logContainer'); container.innerHTML = '';
        const now = new Date();
        const todayStr = now.toLocaleDateString('it-IT');
        const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
        const yesterdayStr = yesterday.toLocaleDateString('it-IT');

        dayHistory.sort((a,b)=>b.split('/').reverse().join('').localeCompare(a.split('/').reverse().join(''))).forEach(day => {
            const dayLogs = logs.filter(l => l.day === day).sort((a,b)=>b.st-a.st);
            const countA = dayLogs.filter(l => l.t === "Turno A" && !String(l.c).toUpperCase().includes("ANNULL") && !String(l.c).includes("CHIUSURA")).length;
            const countB = dayLogs.filter(l => l.t === "Turno B" && !String(l.c).toUpperCase().includes("ANNULL") && !String(l.c).includes("CHIUSURA")).length;
            
            const canDelete = (day !== todayStr && day !== yesterdayStr);
            
            const section = document.createElement('div');
            section.innerHTML = `
                <div class="day-header" onclick="toggleDay(this)">
                    <div>${canDelete ? `<span style="color:var(--red); margin-right:12px;" onclick="deleteDay(event, '${day}')">×</span>` : ''}<span>${day}${day === todayStr ? ' (OGGI)' : ''}</span></div>
                    <div class="day-stats-box">A: <b>${countA}</b> | B: <b>${countB}</b> <span class="arrow-icon">${day === todayStr ? '▼' : '▶'}</span></div>
                </div>
                <div class="day-content" style="display: ${day === todayStr ? 'block' : 'none'}">
                    <table>
                        <thead><tr><th>LINEA</th><th>ATTESA</th><th>DURATA</th><th>CAUSALE</th><th>NOME</th></tr></thead>
                        <tbody>${dayLogs.map(l => `<tr><td><b>${l.i}</b></td><td>${l.tA}m</td><td>${l.tD}m</td><td style="font-size:9px">${l.c}<br><span style="color:#8e8e93; font-size:8px;">[${l.t || calculateTurnoByTimestamp(l.st)}]</span></td><td>${l.tech}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
            container.appendChild(section);
        });
    }

    function clearOldRecords() {
        if(!confirm("Vuoi svuotare tutti i record di 2 giorni prima?")) return;
        const now = new Date();
        const todayStr = now.toLocaleDateString('it-IT');
        const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
        const yesterdayStr = yesterday.toLocaleDateString('it-IT');
        
        logs = logs.filter(l => l.day === todayStr || l.day === yesterdayStr);
        dayHistory = dayHistory.filter(d => d === todayStr || d === yesterdayStr);
        processedStarts = new Set(logs.map(l => l.st));
        saveState(); renderLogs(); renderCombinedCards();
    }

    function toggleDay(header) { const content = header.nextElementSibling; const arrow = header.querySelector('.arrow-icon'); const isHidden = content.style.display === 'none'; content.style.display = isHidden ? 'block' : 'none'; if(arrow) arrow.innerText = isHidden ? '▼' : '▶'; }
    function deleteDay(e, day) { e.stopPropagation(); if(!confirm("Eliminare record del " + day + "?")) return; logs = logs.filter(l => { if(l.day === day) processedStarts.delete(l.st); return l.day !== day; }); dayHistory = dayHistory.filter(d => d !== day); saveState(); renderLogs(); renderCombinedCards(); }
    
    function clearFeedback() { if(confirm("Cancellare tutti i feedback?")) { feedbackLogs=[]; saveState(); renderFeedback(); } }
    function renderFeedback() {
        const container = document.getElementById('feedbackContainer'); 
        container.innerHTML = '';
        if (feedbackLogs.length === 0) { 
            container.innerHTML = '<div style="text-align:center;padding:50px;color:#8e8e93;">Nessun feedback presente.</div>'; 
            return; 
        }
        feedbackLogs.forEach(fb => {
            const div = document.createElement('div'); 
            div.className = 'fb-card';
            div.innerHTML = `
                <div class="fb-head">
                    <div>
                        <div class="fb-name">👤 ${fb.attrezzista}</div>
                        <div style="font-size:9px; color:#8e8e93; font-weight:800; margin-top:2px;">TURNO: ${fb.turno || "N/A"}</div>
                    </div>
                    <div class="fb-score">⭐ ${fb.punteggio}/5</div>
                </div>
                <div class="fb-msg">"${fb.messaggio || "-"}"</div>
                <div class="fb-meta">
                    <span>LINEA: ${fb.linea || "N/A"}</span>
                    <span>${fb.data || ""}</span>
                </div>`;
            container.appendChild(div);
        });
    }


    window.onload = () => {
        document.getElementById('curYear').innerText = new Date().getFullYear();
        updateHeaderTurno();
        cleanCloudHistory(); 
        renderCombinedCards();
    };

    setInterval(() => { renderCombinedCards(); }, 30000); 
</script>
</body>
</html>
