<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Controllo Linee Professional v18.9.25</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f2f2f7; --red: #ff3b30; --orange: #ff9500; --black: #000000; --white: #ffffff; --text-main: #1c1c1e; --text-sec: #8e8e93; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 0 20px 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; flex-shrink: 0; }
        h1 { font-size: 22px; font-weight: 900; margin: 0; letter-spacing: -1px; text-transform: uppercase; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 800; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        #activeList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 15px; align-items: center; }

        .card { 
            background: var(--white); border-radius: 20px; padding: 15px 18px;
            display: flex; align-items: center; 
            width: 100%; max-width: 650px; min-height: 95px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 2.5px solid transparent;
            position: relative; transition: 0.3s;
        }
        .card.st-waiting { border-color: var(--orange); }
        .card.st-working { border-color: var(--red); }
        .card.st-completed { border-color: var(--black); }

        .card-del {
            position: absolute; top: -8px; right: -8px; 
            width: 26px; height: 26px; background: var(--red); 
            color: white; border-radius: 50%; border: 2.5px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 900; cursor: pointer; z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card-left { display: flex; flex-direction: column; gap: 8px; flex: 0.8; min-width: 90px; justify-content: center; align-items: flex-start; }
        .card-badge { 
            font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; 
            text-transform: uppercase; color: #fff; letter-spacing: 0.5px; white-space: nowrap;
        }
        .card-linea { font-size: 24px; font-weight: 900; color: var(--text-main); line-height: 1; margin-left: 2px; }

        .card-center { flex: 2; padding-left: 10px; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
        .card-stats { font-size: 12.5px; font-weight: 600; color: var(--text-sec); line-height: 1.3; white-space: nowrap; }
        .card-stats b { color: #000; font-weight: 800; }

        .bg-orange { background: var(--orange); }
        .bg-red { background: var(--red); }
        .bg-black { background: var(--black); }

        #historyPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 500; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .v-nav { display: flex; align-items: center; justify-content: space-between; height: 55px; padding: 0 20px; border-bottom: 1px solid #f2f2f7; flex-shrink: 0; }
        #logContainer { flex: 1; overflow-y: auto; padding: 15px; }
        
        .day-header { 
            background: #f2f2f7; padding: 12px 15px; font-size: 14px; font-weight: 800; 
            border-radius: 12px; margin-top: 10px; margin-bottom: 5px; 
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 12px 2px; text-align: center; font-size: 11px; border-bottom: 1px solid #f2f2f7; vertical-align: middle; }
        .undo-head { font-size: 18px; color: var(--black); cursor: pointer; font-weight: 900; display: inline-block; padding: 5px; }
        .del-row { color: var(--red); font-weight: 900; cursor: pointer; font-size: 18px; }
        .footer-text { text-align: center; padding: 15px 0; font-size: 10px; font-weight: 900; color: #000; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CONTROLLO LINEE</h1>
        <button class="reg-btn" onclick="showHistory()">Archivio</button>
    </div>

    <div id="activeList"></div>

    <div class="footer-text">© <span id="curYear"></span> HU SHAN. ALL RIGHTS RESERVED.</div>

    <div id="historyPage">
        <div class="v-nav">
            <div style="font-size:28px; cursor:pointer" onclick="closeHistory()">←</div>
            <h2 style="font-size:16px; font-weight:900; margin:0;">RECORD LOCALI</h2>
            <div style="width:28px"></div>
        </div>
        <div id="logContainer"></div>
        <div style="padding:15px;">
            <button style="width:100%; padding:14px; border-radius:12px; border:none; background:#eee; color:var(--red); font-weight:800;" onclick="clearAll()">SVUOTA ARCHIVIO</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let logs = JSON.parse(localStorage.getItem('c_local_v89') || '[]');
    let dayHistory = JSON.parse(localStorage.getItem('c_days_v89') || '[]');
    let processedStarts = new Set(logs.map(l => l.st));
    let cloudData = {};
    let lastDeleted = null;

    setInterval(() => renderCombinedCards(), 60000);

    // --- Firebase 监听及存档逻辑 ---
    db.ref('active_calls').on('value', (snapshot) => {
        cloudData = snapshot.val() || {};
        let needsSave = false;

        Object.keys(cloudData).forEach(id => {
            const item = cloudData[id];
            // 当 B 端点击结束，任务进入 completed 状态时进行归档
            if (item.status === 'completed' && !processedStarts.has(item.startA)) {
                let startD = item.startD || item.startA;
                const newEntry = {
                    i: id, 
                    day: new Date(item.startA).toLocaleDateString('it-IT'),
                    s: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    tA: Math.round((startD - item.startA) / 60000),
                    tD: Math.round(((item.endT || Date.now()) - startD) / 60000),
                    st: item.startA, 
                    et: item.endT || Date.now(),
                    c: item.causale || "-",
                    // 核心修复：存档时捕获 B 端的人员名字
                    tech: item.techName || item.takenBy || "-" 
                };
                logs.push(newEntry);
                processedStarts.add(item.startA);
                if (!dayHistory.includes(newEntry.day)) dayHistory.push(newEntry.day);
                needsSave = true;
                // 归档后从云端移除该记录
                db.ref('active_calls/' + id).remove();
            }
        });

        if(needsSave) saveState();
        renderCombinedCards();
        if(document.getElementById('historyPage').style.display === 'flex') renderLogs();
    });

    function saveState() {
        localStorage.setItem('c_local_v89', JSON.stringify(logs));
        localStorage.setItem('c_days_v89', JSON.stringify(dayHistory));
    }

    // --- 主界面卡片渲染 ---
    function renderCombinedCards() {
        const list = document.getElementById('activeList'); 
        list.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('it-IT');

        // 处理本地已完成但尚未从列表手动隐藏的任务
        const localToDisplay = logs.filter(l => l.day === todayStr && !l.hideFromBoard).map(l => ({
            id: l.i, status: 'completed', startA: l.st, endT: l.et, 
            causale: l.c, techName: l.tech, tA: l.tA, tD: l.tD, isLocal: true,
            sortTime: l.et || l.st, startTimeStr: l.s
        }));

        // 处理云端实时任务（正在等待或正在维修）
        const cloudItems = Object.keys(cloudData).map(id => {
            const item = cloudData[id];
            return { 
                id: id, ...item, isLocal: false, 
                sortTime: (item.status === 'orange') ? item.startA : (item.startB || item.startA),
                startTimeStr: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            };
        });

        // 合并并按时间倒序排序
        const all = [...localToDisplay, ...cloudItems].sort((a, b) => b.sortTime - a.sortTime);

        all.forEach(item => {
            let wait = item.isLocal ? item.tA + "m" : (item.startB ? Math.round((item.startB-item.startA)/60000)+"m" : Math.round((Date.now()-item.startA)/60000)+"m");
            let work = item.isLocal ? item.tD + "m" : (item.startB ? Math.round((Date.now()-item.startB)/60000)+"m" : "0m");
            
            let statusLabel, colorClass, statusKey;
            if(item.status === 'orange') { 
                statusLabel = 'ATTESA'; colorClass = 'orange'; statusKey = 'waiting';
            } else if(item.status === 'red' || item.status === 'finishing') { 
                statusLabel = 'LAVORO'; colorClass = 'red'; statusKey = 'working';
            } else { 
                statusLabel = 'FINE'; colorClass = 'black'; statusKey = 'completed';
            }
            
            // 核心修复：实时渲染时捕获 B 端人员名字
            const operator = item.techName || item.takenBy || "-";
            
            const card = document.createElement('div');
            card.className = `card st-${statusKey}`;
            let delBtn = (item.status === 'completed') ? `<div class="card-del" onclick="handleManualDel('${item.id}', ${item.startA})">×</div>` : '';

            card.innerHTML = `${delBtn}
                <div class="card-left">
                    <div class="card-badge bg-${colorClass}">${statusLabel}</div>
                    <div class="card-linea">${item.id}</div>
                </div>
                <div class="card-center">
                    <div class="card-stats">
                        Inizio: <b>${item.startTimeStr}</b><br>
                        Attesa: <b>${wait}</b> | Durata: <b>${work}</b><br>
                        Causale: <b>${item.causale || "-"}</b><br>
                        Operatore: <b>${operator}</b>
                    </div>
                </div>
                <div class="card-right"></div>`;
            list.appendChild(card);
        });
    }

    function handleManualDel(id, st) {
        if(!confirm("Nascondere dalla bacheca?")) return;
        const idx = logs.findIndex(l => l.st === st);
        if(idx !== -1) {
            lastDeleted = { type: 'hide', index: idx, data: {...logs[idx]} };
            logs[idx].hideFromBoard = true;
            saveState(); renderCombinedCards();
        }
    }

    function showHistory() { document.getElementById('historyPage').style.display = 'flex'; renderLogs(); }
    function closeHistory() { document.getElementById('historyPage').style.display = 'none'; }

    // --- 档案页面渲染逻辑 ---
    function renderLogs() {
        const container = document.getElementById('logContainer'); 
        container.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('it-IT');

        dayHistory.sort((a,b)=>b.split('/').reverse().join('').localeCompare(a.split('/').reverse().join(''))).forEach(day => {
            const dayLogs = logs.filter(l => l.day === day).sort((a,b)=>b.st-a.st);
            const isToday = (day === todayStr);
            const displayStatus = isToday ? 'block' : 'none';
            const arrow = isToday ? '▼' : '▶';

            const section = document.createElement('div');
            section.innerHTML = `
                <div class="day-header" onclick="toggleDay(this)">
                    <div>
                        <span style="color:var(--red); margin-right:12px; cursor:pointer" onclick="deleteDay(event, '${day}')">×</span>
                        <span>${day} ${isToday ? '(OGGI)' : ''}</span>
                    </div>
                    <span class="arrow-icon">${arrow}</span>
                </div>
                <div class="day-content" style="display: ${displayStatus}">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:15%">LINEA</th>
                                <th style="width:10%">A</th>
                                <th style="width:10%">D</th>
                                <th style="width:35%">CAUSALE</th>
                                <th style="width:20%">OPERATORE</th>
                                <th style="width:10%"><span class="undo-head" onclick="undoAction(event)">↺</span></th>
                            </tr>
                        </thead>
                        <tbody>${dayLogs.map(l => {
                            const idx = logs.indexOf(l);
                            return `<tr>
                                <td><b>${l.i}</b></td>
                                <td>${l.tA}m</td>
                                <td>${l.tD}m</td>
                                <td style="font-size:9px">${l.c}</td>
                                <td>${l.tech}</td>
                                <td class="del-row" onclick="deleteRow(${idx})">×</td>
                            </tr>`}).join('')}</tbody>
                    </table>
                </div>`;
            container.appendChild(section);
        });
    }

    function toggleDay(headerElement) {
        const content = headerElement.nextElementSibling;
        const arrow = headerElement.querySelector('.arrow-icon');
        if (content.style.display === 'none') {
            content.style.display = 'block';
            arrow.innerText = '▼';
        } else {
            content.style.display = 'none';
            arrow.innerText = '▶';
        }
    }

    function undoAction(e) {
        if(e) e.stopPropagation();
        if(!lastDeleted) return;
        if(lastDeleted.type === 'hide') {
            logs[lastDeleted.index].hideFromBoard = false;
        } else if(lastDeleted.type === 'delete') {
            logs.splice(lastDeleted.index, 0, lastDeleted.data);
            processedStarts.add(lastDeleted.data.st);
            if(!dayHistory.includes(lastDeleted.data.day)) dayHistory.push(lastDeleted.data.day);
        }
        lastDeleted = null;
        saveState(); renderCombinedCards(); renderLogs();
    }

    function deleteRow(idx) { 
        lastDeleted = { type: 'delete', index: idx, data: {...logs[idx]} };
        const removed = logs.splice(idx, 1)[0];
        processedStarts.delete(removed.st);
        saveState(); renderLogs(); renderCombinedCards();
    }
    
    function deleteDay(e, day) {
        e.stopPropagation();
        if(!confirm("Eliminare record del " + day + "?")) return;
        logs = logs.filter(l => { if(l.day === day) processedStarts.delete(l.st); return l.day !== day; });
        dayHistory = dayHistory.filter(d => d !== day);
        saveState(); renderLogs(); renderCombinedCards();
    }

    function clearAll() {
        if(!confirm("Svuota tutto l'archivio locale?")) return;
        logs = []; dayHistory = []; processedStarts.clear(); saveState(); renderLogs(); renderCombinedCards();
    }

    document.getElementById('curYear').innerText = new Date().getFullYear();
</script>
</body>
</html>
