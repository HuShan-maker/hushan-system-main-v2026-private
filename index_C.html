<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Controllo Linee Professional v18.9.36</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f2f2f7; --red: #ff3b30; --orange: #ff9500; --black: #000000; --white: #ffffff; --text-main: #1c1c1e; --text-sec: #8e8e93; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 0 20px 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; flex-shrink: 0; }
        h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.5px; text-transform: uppercase; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        #activeList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 15px; align-items: center; }

        .card { 
            background: var(--white); border-radius: 20px; padding: 15px 18px;
            display: flex; align-items: center; 
            width: 100%; max-width: 650px; min-height: 95px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 2px solid transparent;
            position: relative; transition: 0.3s;
        }
        .card.st-waiting { border-color: var(--orange); }
        .card.st-working { border-color: var(--red); }
        .card.st-completed { border-color: var(--black); }

        .card-del {
            position: absolute; top: -8px; right: -8px; 
            width: 24px; height: 24px; background: var(--red); 
            color: white; border-radius: 50%; border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; cursor: pointer; z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card-left { display: flex; flex-direction: column; gap: 6px; flex: 0.7; min-width: 80px; justify-content: center; align-items: flex-start; }
        .card-badge { 
            font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 5px; 
            text-transform: uppercase; color: #fff; letter-spacing: 0.3px; white-space: nowrap;
        }
        .card-linea { font-size: 22px; font-weight: 700; color: var(--text-main); line-height: 1; margin-left: 2px; }

        .card-center { flex: 2; padding-left: 10px; display: flex; flex-direction: column; gap: 3px; justify-content: center; border-right: 1px solid #f2f2f7; }
        .card-stats { font-size: 12px; font-weight: 500; color: var(--text-sec); line-height: 1.4; white-space: nowrap; }
        .card-stats b { color: #000; font-weight: 600; }

        .card-right { flex: 0.6; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-left: 10px; min-width: 70px; }
        .total-label { font-size: 8px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; margin-bottom: 2px; }
        .total-val { font-size: 18px; font-weight: 700; color: var(--black); line-height: 1; }

        .bg-orange { background: var(--orange); }
        .bg-red { background: var(--red); }
        .bg-black { background: var(--black); }

        .timeout-critical { animation: pulseWarning 0.8s infinite; border-color: var(--black) !important; background: #fff9f0; }
        @keyframes pulseWarning { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #historyPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 500; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .v-nav { display: flex; align-items: center; justify-content: space-between; height: 55px; padding: 0 20px; border-bottom: 1px solid #f2f2f7; flex-shrink: 0; }
        #logContainer { flex: 1; overflow-y: auto; padding: 15px; }
        
        .day-header { 
            background: #f2f2f7; padding: 12px 15px; font-size: 13px; font-weight: 700; 
            border-radius: 12px; margin-top: 10px; margin-bottom: 5px; 
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 10px 2px; text-align: center; font-size: 11px; border-bottom: 1px solid #f2f2f7; vertical-align: middle; }
        th { font-weight: 700; color: var(--text-sec); text-transform: uppercase; font-size: 9px; }
        .undo-head { font-size: 16px; color: var(--black); cursor: pointer; font-weight: 700; display: inline-block; padding: 5px; }
        .del-row { color: var(--red); font-weight: 700; cursor: pointer; font-size: 18px; }

        /* --- 醒目版权样式修改 --- */
        .footer-text { 
            text-align: center; 
            padding: 20px 0; 
            font-size: 11px; 
            font-weight: 800; /* 加粗 */
            color: #000000;   /* 纯黑，非常醒目 */
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CONTROLLO LINEE</h1>
        <button class="reg-btn" onclick="showHistory()">Archivio</button>
    </div>

    <div id="activeList"></div>

    <div class="footer-text">© <span id="curYear"></span> HU SHAN · ALL RIGHTS RESERVED</div>

    <div id="historyPage">
        <div class="v-nav">
            <div style="font-size:28px; cursor:pointer" onclick="closeHistory()">←</div>
            <h2 style="font-size:15px; font-weight:700; margin:0;">RECORD LOCALI</h2>
            <div style="width:28px"></div>
        </div>
        <div id="logContainer"></div>
        <div style="padding:15px;">
            <button style="width:100%; padding:14px; border-radius:12px; border:none; background:#f2f2f7; color:var(--red); font-weight:700;" onclick="clearAll()">SVUOTA ARCHIVIO</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let logs = JSON.parse(localStorage.getItem('c_local_v89') || '[]');
    let dayHistory = JSON.parse(localStorage.getItem('c_days_v89') || '[]');
    let processedStarts = new Set(logs.map(l => l.st));
    let cloudData = {};
    let lastDeleted = null;

    // --- 30天自动清理记录逻辑 ---
    function autoCleanOldRecords() {
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        
        let needsSave = false;
        dayHistory = dayHistory.filter(dayStr => {
            const [d, m, y] = dayStr.split('/');
            const recordDate = new Date(y, m - 1, d);
            if (recordDate < thirtyDaysAgo) {
                logs = logs.filter(l => l.day !== dayStr);
                needsSave = true;
                return false; 
            }
            return true;
        });

        if (needsSave) {
            processedStarts = new Set(logs.map(l => l.st));
            saveState();
        }
    }

    // 初始化执行清理
    autoCleanOldRecords();

    // 每30秒重绘一次界面确保时间实时更新
    setInterval(() => renderCombinedCards(), 30000); 

    function getRealTimeTurno() {
        const now = new Date();
        const hour = now.getHours() + (now.getMinutes() / 60);
        const start = new Date(now.getFullYear(), 0, 1);
        const week = Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        const isSingleWeek = week % 2 !== 0; 
        const isAfternoon = (hour >= 14.25); 
        return isSingleWeek ? (isAfternoon ? "Turno A" : "Turno B") : (isAfternoon ? "Turno B" : "Turno A");
    }

    // Firebase 实时监听
    db.ref('active_calls').on('value', (snapshot) => {
        cloudData = snapshot.val() || {};
        const currentTurno = getRealTimeTurno();
        let needsSave = false;

        Object.keys(cloudData).forEach(id => {
            const item = cloudData[id];
            // 换班逻辑：如果云端任务属于旧班次，自动结案并归档
            if (item.turno && item.turno !== currentTurno) {
                const manualItem = { ...item, status: 'completed', endT: Date.now(), causale: "Chiusura pratica turno precedente" };
                archiveTask(id, manualItem);
                needsSave = true;
            }
            // 正常完成逻辑：B端点击完成后的处理
            else if (item.status === 'completed' && !processedStarts.has(item.startA)) {
                archiveTask(id, item);
                needsSave = true;
            }
        });

        if(needsSave) saveState();
        renderCombinedCards();
        if(document.getElementById('historyPage').style.display === 'flex') renderLogs();
    });

    function archiveTask(id, item) {
        let startD = item.startD || item.startA;
        let endT = item.endT || Date.now();
        const newEntry = {
            i: id, 
            day: new Date(item.startA).toLocaleDateString('it-IT'),
            s: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            tA: Math.round((startD - item.startA) / 60000),
            tD: Math.round((endT - startD) / 60000),
            st: item.startA, 
            et: endT,
            c: item.causale || "-",
            tech: item.techName || item.takenBy || "-" 
        };
        logs.push(newEntry);
        processedStarts.add(item.startA);
        if (!dayHistory.includes(newEntry.day)) dayHistory.push(newEntry.day);
        db.ref('active_calls/' + id).remove();
    }

    function saveState() {
        localStorage.setItem('c_local_v89', JSON.stringify(logs));
        localStorage.setItem('c_days_v89', JSON.stringify(dayHistory));
    }

    function renderCombinedCards() {
        const list = document.getElementById('activeList'); 
        list.innerHTML = '';
        const now = Date.now();
        const todayStr = new Date().toLocaleDateString('it-IT');

        const localToDisplay = logs.filter(l => l.day === todayStr && !l.hideFromBoard).map(l => ({
            id: l.i, status: 'completed', startA: l.st, endT: l.et, 
            causale: l.c, techName: l.tech, tA: l.tA, tD: l.tD, isLocal: true,
            sortTime: l.et || l.st, startTimeStr: l.s
        }));

        const cloudItems = Object.keys(cloudData).map(id => {
            const item = cloudData[id];
            return { 
                id: id, ...item, isLocal: false, 
                sortTime: (item.status === 'orange') ? item.startA : (item.startB || item.startA),
                startTimeStr: new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            };
        });

        const all = [...localToDisplay, ...cloudItems].sort((a, b) => b.sortTime - a.sortTime);

        all.forEach(item => {
            let waitMin = item.isLocal ? item.tA : (item.startB ? Math.round((item.startB-item.startA)/60000) : Math.round((now-item.startA)/60000));
            let workMin = item.isLocal ? item.tD : (item.startB ? Math.round((now-item.startB)/60000) : 0);
            let totalMin = waitMin + workMin;
            
            let statusLabel, colorClass, statusKey;
            if(item.status === 'orange') { 
                statusLabel = 'ATTESA'; colorClass = 'orange'; statusKey = 'waiting';
            } else if(item.status === 'red' || item.status === 'finishing') { 
                statusLabel = 'LAVORO'; colorClass = 'red'; statusKey = 'working';
            } else { 
                statusLabel = 'FINE'; colorClass = 'black'; statusKey = 'completed';
            }
            
            const card = document.createElement('div');
            card.className = `card st-${statusKey}`;
            
            // 监控逻辑：橙色等待超过15分钟触发警报
            if(!item.isLocal && item.status === 'orange' && waitMin > 15) {
                card.classList.add('timeout-critical');
            }

            card.innerHTML = `<div class="card-del" onclick="handleManualDel('${item.id}', ${item.startA}, ${item.isLocal}, '${item.status}')">×</div>
                <div class="card-left">
                    <div class="card-badge bg-${colorClass}">${statusLabel}</div>
                    <div class="card-linea">${item.id}</div>
                </div>
                <div class="card-center">
                    <div class="card-stats">
                        Inizio: <b>${item.startTimeStr}</b><br>
                        Attesa: <b>${waitMin}m</b> | Durata: <b>${workMin}m</b><br>
                        Causale: <b>${item.causale || "-"}</b><br>
                        Technico: <b>${item.techName || item.takenBy || "-"}</b>
                    </div>
                </div>
                <div class="card-right">
                    <div class="total-label">Totale</div>
                    <div class="total-val">${totalMin}m</div>
                </div>`;
            list.appendChild(card);
        });
    }

    // 核心修改：手动点击 X 时的询问逻辑
    function handleManualDel(id, st, isLocal, currentStatus) {
        const isUnfinished = (currentStatus === 'orange' || currentStatus === 'red' || currentStatus === 'finishing');
        
        // 意大利语询问：正在进行的问“是否中断”，已完成的问“是否删除”
        let msg = isUnfinished ? "Interrompere l'intervento?" : "Eliminare questa registrazione?";
        
        if(!confirm(msg)) return;

        if (isLocal) {
            const idx = logs.findIndex(l => l.st === st);
            if(idx !== -1) {
                lastDeleted = { type: 'hide', index: idx, data: {...logs[idx]} };
                logs[idx].hideFromBoard = true;
            }
        } else {
            const item = cloudData[id];
            if (item && item.startA === st) {
                // 如果是手动强行中断未完成的任务，加上理由
                let suffix = isUnfinished ? " (INTERROTTO)" : " (MANUALE)";
                const manualItem = { 
                    ...item, 
                    status: 'completed', 
                    endT: Date.now(), 
                    causale: item.causale ? item.causale + suffix : suffix.trim() 
                };
                archiveTask(id, manualItem);
            }
        }
        saveState();
        renderCombinedCards();
    }

    function showHistory() { document.getElementById('historyPage').style.display = 'flex'; renderLogs(); }
    function closeHistory() { document.getElementById('historyPage').style.display = 'none'; }

    function renderLogs() {
        const container = document.getElementById('logContainer'); 
        container.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('it-IT');

        dayHistory.sort((a,b)=>b.split('/').reverse().join('').localeCompare(a.split('/').reverse().join(''))).forEach(day => {
            const dayLogs = logs.filter(l => l.day === day).sort((a,b)=>b.st-a.st);
            const isToday = (day === todayStr);
            const section = document.createElement('div');
            section.innerHTML = `
                <div class="day-header" onclick="toggleDay(this)">
                    <div>
                        <span style="color:var(--red); margin-right:12px;" onclick="deleteDay(event, '${day}')">×</span>
                        <span>${day} ${isToday ? '(OGGI)' : ''}</span>
                    </div>
                    <span class="arrow-icon">${isToday ? '▼' : '▶'}</span>
                </div>
                <div class="day-content" style="display: ${isToday ? 'block' : 'none'}">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:20%">LINEA</th>
                                <th style="width:15%">ATTESA</th>
                                <th style="width:15%">DURATA</th>
                                <th style="width:35%">CAUSALE</th>
                                <th style="width:15%"><span class="undo-head" onclick="undoAction(event)">↺</span></th>
                            </tr>
                        </thead>
                        <tbody>${dayLogs.map(l => {
                            const idx = logs.indexOf(l);
                            return `<tr>
                                <td><b>${l.i}</b></td>
                                <td>${l.tA}m</td>
                                <td>${l.tD}m</td>
                                <td style="font-size:9px">${l.c}</td>
                                <td class="del-row" onclick="deleteRow(${idx})">×</td>
                            </tr>`}).join('')}</tbody>
                    </table>
                </div>`;
            container.appendChild(section);
        });
    }

    function toggleDay(header) {
        const content = header.nextElementSibling;
        const arrow = header.querySelector('.arrow-icon');
        const isHidden = content.style.display === 'none';
        content.style.display = isHidden ? 'block' : 'none';
        arrow.innerText = isHidden ? '▼' : '▶';
    }

    function undoAction(e) {
        if(e) e.stopPropagation();
        if(!lastDeleted) return;
        if(lastDeleted.type === 'hide') logs[lastDeleted.index].hideFromBoard = false;
        else if(lastDeleted.type === 'delete') {
            logs.splice(lastDeleted.index, 0, lastDeleted.data);
            processedStarts.add(lastDeleted.data.st);
        }
        lastDeleted = null; saveState(); renderCombinedCards(); renderLogs();
    }

    function deleteRow(idx) { 
        lastDeleted = { type: 'delete', index: idx, data: {...logs[idx]} };
        const removed = logs.splice(idx, 1)[0];
        processedStarts.delete(removed.st);
        saveState(); renderLogs(); renderCombinedCards();
    }
    
    function deleteDay(e, day) {
        e.stopPropagation();
        if(!confirm("Eliminare record del " + day + "?")) return;
        logs = logs.filter(l => { if(l.day === day) processedStarts.delete(l.st); return l.day !== day; });
        dayHistory = dayHistory.filter(d => d !== day);
        saveState(); renderLogs(); renderCombinedCards();
    }

    function clearAll() {
        if(!confirm("Svuota tutto l'archivio?")) return;
        logs = []; dayHistory = []; processedStarts.clear(); saveState(); renderLogs(); renderCombinedCards();
    }

    document.getElementById('curYear').innerText = new Date().getFullYear();
</script>
</body>
</html>
