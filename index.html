<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LINK DIRETTO LUX-PED</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root { --blue: #007aff; --red: #ff3b30; --black: #000000; --gray: #8e8e93; --bg: #f2f2f7; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        
        /* 初始状态隐藏主内容，防止跳转时闪现 */
        .main-content { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

        .header { text-align: center; margin-bottom: 35px; }
        h1 { font-size: 26px; font-weight: 900; margin: 0; color: var(--black); letter-spacing: -1px; text-transform: uppercase; }
        p { color: var(--gray); font-size: 13px; font-weight: 700; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        .menu { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 16px; }
        
        .option {
            background: #fff; border-radius: 22px; padding: 18px 22px;
            text-decoration: none; display: flex; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 2.5px solid transparent;
        }
        .option:active { transform: scale(0.97); background: #f2f2f7; }

        .icon { font-size: 30px; margin-right: 18px; width: 45px; text-align: center; }
        .text-group { display: flex; flex-direction: column; }
        .title { font-size: 17px; font-weight: 800; color: var(--black); }
        .desc { font-size: 11px; color: var(--gray); margin-top: 3px; font-weight: 600; text-transform: uppercase; }

        .opt-a { border-left: 6px solid var(--blue); }
        .opt-b { border-left: 6px solid var(--red); }
        .opt-c { border-left: 6px solid var(--black); }

        .footer-text { 
            text-align: center; padding: 20px 0; font-size: 10px; 
            font-weight: 900; color: #000; text-transform: uppercase; 
            letter-spacing: 1px; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="main-content" id="appBody">
        <div class="header">
            <h1>LINK DIRETTO</h1>
            <p>Seleziona il tuo profilo</p>
        </div>

        <div class="menu">
            <a href="index_A.html?role=worker" class="option opt-a">
                <div class="icon">📱</div>
                <div class="text-group">
                    <span class="title">LATO A: PRODUZIONE</span>
                    <span class="desc">Chiamata rapida tecnico</span>
                </div>
            </a>

            <a href="index_B.html?role=tech" class="option opt-b">
                <div class="icon">🛠️</div>
                <div class="text-group">
                    <span class="title">LATO B: ATTREZZISTI</span>
                    <span class="desc">Gestione interventi tecnici</span>
                </div>
            </a>

            <a href="index_C.html?role=boss" class="option opt-c">
                <div class="icon">📊</div>
                <div class="text-group">
                    <span class="title">LATO C: CAPI TURNO</span>
                    <span class="desc">Monitoraggio e statistiche</span>
                </div>
            </a>
        </div>
    </div>

    <div class="footer-text">© <span id="curYear"></span> HU SHAN · ALL RIGHTS RESERVED</div>

    <script>
        // 1. 获取 URL 里的身份参数
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');

        // 2. 自动化分流判断
        if (role === 'A') {
            // 如果是工人，直接跳转到 A 端，并带上锁定标记
            window.location.replace('index_A.html?role=worker');
        } else if (role === 'B') {
            // 如果是维修工，直接跳转到 B 端
            window.location.replace('index_B.html?role=tech');
        } else if (role === 'C') {
            // 如果是工头，直接跳转到 C 端
            window.location.replace('index_C.html?role=boss');
        } else {
            // 如果没有参数，才显示选择菜单
            document.getElementById('appBody').style.display = 'flex';
        }

        document.getElementById('curYear').innerText = new Date().getFullYear();

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA: Service Worker OK'))
                    .catch(err => console.log('PWA: Service Worker Error', err));
            });
        }
    </script>
</body>
</html>
