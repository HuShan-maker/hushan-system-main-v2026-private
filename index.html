<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>B - Technicians</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --card: #e5e5ea; --red: #ff3b30; --orange: #ff9500; --btn-gray: #f2f2f7; }
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: calc(15px + env(safe-area-inset-top)) 20px 20px 20px; margin: 0; }
        
        /* 顶部栏 */
        .h { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 35px; }
        h2 { margin: 0; font-size: 16px; font-weight: 800; text-transform: uppercase; }
        .user-subtitle { font-size: 14px; color: #8e8e93; font-weight: 600; cursor: pointer; }
        .reg-btn { background: #000; color: #fff; font-size: 11px; border: none; padding: 0 14px; border-radius: 9px; font-weight: 700; height: 25px; display: flex; align-items: center; }
        
        /* 钢琴键导航 */
        .pianos { display: flex; gap: 5px; margin-bottom: 25px; padding: 12px 0 8px 0; }
        .p-btn { flex: 1; background: var(--btn-gray); color: #8e8e93; border: none; padding: 10px 0; border-radius: 12px; font-weight: 700; font-size: 10px; position: relative; }
        .p-btn.active { color: #fff !important; }
        .p-badge { position: absolute; top: -5px; right: -5px; background: var(--red); width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; animation: badgePulse 1.5s infinite; }
        @keyframes badgePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* 网格布局 */
        #g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .btn-machine { width: 100%; height: 100%; border: none; border-radius: 24px; font-weight: 800; font-size: 17px; background: var(--btn-gray); transition: 0.3s; }
        .badge { position: absolute; top: -4px; right: -4px; width: 22px; height: 22px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; }

        /* 状态颜色 */
        .or { background: var(--red) !important; color: #fff !important; animation: pulseRed 1.5s infinite; }
        .waiting { background: var(--orange) !important; color: #fff !important; animation: pulseOrange 1.5s infinite; }
        @keyframes pulseRed { 50% { opacity: 0.8; } }
        @keyframes pulseOrange { 50% { opacity: 0.7; } }

        /* 呼叫弹窗样式 */
        #callAlert { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--orange); z-index: 1000; flex-direction: column; 
            align-items: center; justify-content: center; color: white; text-align: center;
        }
        #callAlert h1 { font-size: 80px; margin: 0; font-weight: 900; }
        #callAlert p { font-size: 24px; font-weight: 700; }
        #callAlert button { 
            margin-top: 30px; padding: 20px 60px; border-radius: 20px; border: none; 
            background: white; color: var(--orange); font-size: 24px; font-weight: 900; 
        }

        /* 其他原有样式 (弹窗、注册表等) ... 省略部分以保持清晰，逻辑中已包含 */
        .bottom-area { display: flex; justify-content: center; margin-top: 20px; }
        .fuori-btn { background: var(--btn-gray); border: none; border-radius: 18px; font-size: 14px; font-weight: 800; height: 65px; width: 160px; }
        #modal, #nameModal, #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 85%; padding: 25px; border-radius: 30px; text-align: center; }
        .modal-content input { width: 90%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 18px; text-align: center; }
        #v { background: #fff; display: none; flex-direction: column; z-index: 450; position: fixed; top: 0; left: 0; width: 100%; height: 100%; padding-top: 40px; }
    </style>
</head>
<body>

    <!-- 呼叫弹窗 -->
    <div id="callAlert">
        <p>⚠️ NUOVA CHIAMATA</p>
        <h1 id="alertLinea">---</h1>
        <button onclick="closeAlert()">RICEVUTO</button>
    </div>

    <div class="h">
        <div class="title-group"><h2>OPERATORE</h2><div id="userNameDisp" class="user-subtitle" onclick="handleNameClick()">Hu_Shan</div></div>
        <button class="reg-btn" onclick="showMemoria()">registro</button>
    </div>

    <div class="pianos">
        <button class="p-btn active" id="p-btn-1" onclick="switchPiano(1)">Piano 1</button>
        <button class="p-btn" id="p-btn-2" onclick="switchPiano(2)">Piano 2</button>
        <button class="p-btn" id="p-btn-3" onclick="switchPiano(3)">Piano 3</button>
        <button class="p-btn" id="p-btn-4" onclick="switchPiano(4)">Piano 4</button>
        <button class="p-btn" id="p-btn-5" onclick="switchPiano(5)">Piano 5</button>
    </div>

    <div id="g"></div>
    <div class="bottom-area"><button id="btn-fuori" class="fuori-btn" onclick="toggleFuori()">FUORI LINEA</button></div>

    <!-- 弹窗组件 -->
    <div id="modal"><div class="modal-content"><h3>Causale</h3><input type="text" id="causaleInput" oninput="handleShortcut(event)"><button class="modal-btn" onclick="saveCausale()">SALVA</button></div></div>
    <div id="nameModal"><div class="modal-content"><h3>Nome</h3><input type="text" id="nameInput"><button class="modal-btn" onclick="saveName()">SALVA</button></div></div>

    <!-- 注册表页面 -->
    <div id="v">
        <div style="padding: 20px; display: flex; justify-content: space-between;">
            <button onclick="closeMemoria()">← Back</button>
            <b>REGISTRO</b>
            <span></span>
        </div>
        <div id="logContainer" style="overflow-y: auto; padding: 10px;"></div>
    </div>

<script>
    // --- FIREBASE 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 状态变量 ---
    const pianoData = { 
        1: ['101','101bis','102','102bis','103','103bis','104','104bis','105','105bis','106','106bis','107','107bis','108','108bis'], 
        2: ['201','201bis','202','202bis','203','203bis','204','204bis','205','205bis','206','206bis','207','207bis','208','208bis'], 
        3: ['301','301bis','302','302bis','303','303bis','304','304bis','305','305bis','306','306bis','307','307bis','308','308bis'], 
        4: ['401','401bis','402','402bis','403','403bis','404','404bis','405','405bis','406','406bis','407','407bis','408','408bis'],
        5: ['501','501bis','502','502bis','503','503bis','504','504bis','505','505bis','506','506bis','507','507bis','508','508bis']
    };
    let act = JSON.parse(localStorage.getItem('act_v7') || '{}');
    let logs = JSON.parse(localStorage.getItem('logs_v7') || '[]');
    let dayHistory = JSON.parse(localStorage.getItem('dayHistory_v7') || '[]');
    let curPiano = 1;

    // --- 实时监听与弹窗逻辑 ---
    db.ref('active_calls').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        Object.keys(data).forEach(id => {
            // 如果收到一个新的橙色呼叫，且本地还没记录
            if (data[id].status === 'orange' && (!act[id] || act[id].status !== 'orange')) {
                showCallAlert(id);
            }
            act[id] = data[id];
        });

        // 清理本地已关闭的呼叫
        Object.keys(act).forEach(id => {
            if (!data[id] && act[id].status === 'orange') delete act[id];
        });

        renderGrid();
        updateGlobalBadges();
    });

    function showCallAlert(id) {
        document.getElementById('alertLinea').innerText = id;
        document.getElementById('callAlert').style.display = 'flex';
        // 播放提示音 (Mixkit 免费音效)
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(() => {}); // 捕获浏览器静音限制
    }

    function closeAlert() {
        document.getElementById('callAlert').style.display = 'none';
    }

    function handleMachineClick(id) {
        const now = Date.now();
        if (!act[id]) {
            act[id] = { startA: now, status: 'red', startD: now };
            db.ref('active_calls/' + id).set(act[id]);
        } else if (act[id].status === 'orange') {
            act[id].status = 'red'; act[id].startD = now;
            db.ref('active_calls/' + id).update({ status: 'red', startD: now });
        } else {
            db.ref('active_calls/' + id).remove();
            let startD = act[id].startD || act[id].startA;
            tempLog = { i: id, day: new Date().toLocaleDateString('it-IT'), s: new Date(act[id].startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), tA: Math.round((startD - act[id].startA) / 60000), tD: Math.round((now - startD) / 60000), st: act[id].startA };
            delete act[id]; saveState(); renderGrid(); showModal(id);
        }
    }

    // --- 核心渲染函数 ---
    function renderGrid() {
        const gd = document.getElementById('g'); gd.innerHTML = '';
        pianoData[curPiano].forEach(i => {
            const wrap = document.createElement('div');
            wrap.className = 'btn-wrap';
            const b = document.createElement('button');
            const s = act[i];
            b.className = 'btn-machine ' + (s ? (s.status === 'red' ? 'or' : 'waiting') : '');
            b.innerText = i;
            b.onclick = () => handleMachineClick(i);
            wrap.appendChild(b);
            gd.appendChild(wrap);
        });
    }

    // --- 辅助功能 (省略重复的样式切换逻辑以节省空间) ---
    function saveState() { localStorage.setItem('act_v7', JSON.stringify(act)); localStorage.setItem('logs_v7', JSON.stringify(logs)); localStorage.setItem('dayHistory_v7', JSON.stringify(dayHistory)); }
    function switchPiano(p) { curPiano = p; renderGrid(); document.querySelectorAll('.p-btn').forEach((b,idx)=>b.classList.toggle('active', idx+1===p)); }
    function showModal(id) { document.getElementById('modal').style.display='flex'; document.getElementById('causaleInput').value=''; }
    function saveCausale() { tempLog.c = document.getElementById('causaleInput').value || "-"; logs.push(tempLog); if(!dayHistory.includes(tempLog.day)) dayHistory.push(tempLog.day); saveState(); document.getElementById('modal').style.display='none'; }
    function showMemoria() { document.getElementById('v').style.display='flex'; }
    function closeMemoria() { document.getElementById('v').style.display='none'; }
    function toggleFuori() { handleMachineClick('FUORI'); }

    renderGrid();
</script>
</body>
</html>
