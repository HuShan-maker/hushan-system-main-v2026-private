<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>B - Technician Card Mode v19.0.3</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { 
            --bg: #f2f2f7; 
            --card-bg: #ffffff;
            --red: #ff3b30; 
            --orange: #ff9500; 
            --green: #34c759;
            --blue: #007aff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
        }
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); 
            padding: calc(20px + env(safe-area-inset-top)) 15px 40px 15px; 
            margin: 0; overflow-x: hidden; 
        }

        /* Header */
        .h { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        h2 { margin: 0; font-size: 18px; font-weight: 800; }
        .turno-badge { font-size: 11px; font-weight: 800; color: #fff; background: #8e8e93; padding: 3px 10px; border-radius: 6px; margin-left: 8px; vertical-align: middle; }
        .turno-on { background: var(--green) !important; box-shadow: 0 0 8px rgba(52, 199, 89, 0.4); }
        .user-subtitle { font-size: 14px; color: var(--text-sub); font-weight: 600; margin-top: 5px; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 0 16px; border-radius: 9px; font-weight: 700; height: 32px; display: flex; align-items: center; font-size: 11px; text-transform: uppercase; }

        /* Card List */
        #cardList { display: flex; flex-direction: column; gap: 15px; }
        .card { 
            background: var(--card-bg); border-radius: 22px; padding: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; border-left: 8px solid #d1d1d6;
        }
        .card.status-orange { border-left-color: var(--orange); animation: pulse 2s infinite; }
        .card.status-red { border-left-color: var(--red); transform: scale(1.02); z-index: 10; box-shadow: 0 12px 30px rgba(255,59,48,0.12); }
        .card.is-fuori { border-left-color: var(--blue); } /* Fuori Linea 使用蓝色区分 */
        .card.taken-by-others { opacity: 0.4; filter: grayscale(0.7); pointer-events: none; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .m-id { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .m-time { font-size: 12px; color: var(--text-sub); font-weight: 700; }
        .card-body { font-size: 15px; color: #3a3a3c; font-weight: 600; margin-bottom: 18px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .tech-info { font-size: 11px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; }

        .btn { border: none; border-radius: 12px; padding: 12px 24px; font-weight: 800; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        .btn-take { background: var(--orange); color: #fff; }
        .btn-close { background: var(--red); color: #fff; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,149,0,0.4); } 70% { box-shadow: 0 0 0 12px rgba(255,149,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,149,0,0); } }

        /* Floating Action Button for Fuori Linea */
        .fuori-container { margin-top: 30px; display: flex; justify-content: center; }
        .btn-fuori-add { 
            width: 85%; height: 58px; background: #fff; border: 3px solid #000; 
            border-radius: 20px; font-weight: 900; font-size: 16px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Registro 面板 (保持之前功能) */
        #v { background: #fff; display: none; flex-direction: column; z-index: 300; position: fixed; top: 0; left: 0; width: 100%; height: 100%; padding-top: calc(10px + env(safe-area-inset-top)); }
        #logScroll { flex: 1; overflow-y: auto; padding: 15px; }
        .day-label { background: #f2f2f7; padding: 10px 15px; border-radius: 10px; font-weight: 800; margin-top: 20px; font-size: 14px; }
        table { width: 100%; margin-top: 10px; font-size: 13px; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #f2f2f7; text-align: center; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-box { background: #fff; width: 88%; padding: 25px; border-radius: 30px; text-align: center; }
        .modal-input { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #e5e5ea; font-size: 17px; margin: 15px 0; outline: none; text-align: center; background: #f9f9fb; }
        .modal-main-btn { width: 100%; padding: 16px; background: #000; color: #fff; border-radius: 18px; font-weight: 800; border: none; font-size: 16px; }
    </style>
</head>
<body>

    <div class="h">
        <div>
            <h2 id="mainTitle">ATTREZZISTI <span id="turnoDisp" class="turno-badge">--</span></h2>
            <div id="userNameDisp" class="user-subtitle" onclick="openNameModal()">Hu_Shan</div>
        </div>
        <button class="reg-btn" onclick="openReg()">Registro</button>
    </div>

    <div id="cardList">
        </div>

    <div class="fuori-container">
        <button class="btn-fuori-add" onclick="startFuori()">
            <span style="font-size:24px;">+</span> REGISTRA ATTIVITÀ (FUORI)
        </button>
    </div>

    <div id="modalName" class="modal"><div class="modal-box"><h3>Il tuo nome</h3><input type="text" id="inputName" class="modal-input"><button class="modal-main-btn" onclick="saveName()">SALVA</button></div></div>

    <div id="modalFuori" class="modal"><div class="modal-box"><h3>Cosa hai fatto?</h3><input type="text" id="inputFuoriCausale" class="modal-input" placeholder="Es: Pulizia morsa, Sistemazione..."><button class="modal-main-btn" onclick="confirmEndFuori()">TERMINA E SALVA</button></div></div>

    <div id="v">
        <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #eee;">
            <div style="font-size:30px; width:40px;" onclick="closeReg()">←</div>
            <div style="flex:1; text-align:center; font-weight:900;">ARCHIVIO INTERVENTI</div>
            <div style="width:40px;"></div>
        </div>
        <div id="logScroll"></div>
        <div style="padding:20px; border-top:1px solid #eee; display:flex; gap:10px;">
            <button class="btn" style="flex:1; background:#f2f2f7; color:red;" onclick="clearLogs()">SVUOTA</button>
            <button class="btn" style="flex:2; background:#000; color:#fff;" onclick="shareLogs()">INVIA WHATSAPP</button>
        </div>
    </div>

<script>
    // --- 1. Firebase & Setup ---
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let serverTimeOffset = 0;
    db.ref(".info/serverTimeOffset").on("value", s => serverTimeOffset = s.val() || 0);

    const myId = localStorage.getItem('deviceId') || 'dev_' + Math.random().toString(36).substr(2,9);
    localStorage.setItem('deviceId', myId);

    let uName = localStorage.getItem('userName') || 'Hu_Shan';
    let logs = JSON.parse(localStorage.getItem('logs_v19') || '[]');
    let act = {};

    // --- 2. Turno Logic ---
    function getTurno() {
        const now = new Date(Date.now() + serverTimeOffset);
        const hour = now.getHours() + (now.getMinutes() / 60);
        const week = Math.ceil((((now - new Date(now.getFullYear(),0,1)) / 86400000) + 1) / 7);
        const isAfternoon = (hour >= 14.25);
        return (week % 2 !== 0) ? (isAfternoon ? "Turno A" : "Turno B") : (isAfternoon ? "Turno B" : "Turno A");
    }

    // --- 3. Main Data Listener ---
    db.ref('active_calls').on('value', (snap) => {
        act = snap.val() || {};
        const curTurno = getTurno();

        // 自动结案不同班次的任务
        Object.keys(act).forEach(k => {
            if (act[k].turno && act[k].turno !== curTurno) {
                const item = act[k];
                const now = Date.now() + serverTimeOffset;
                saveToLog(k, (item.causale||"")+" (Auto-Fine)", item.startA, item.startD || item.startA, now, item.techName);
                db.ref('active_calls/'+k).remove();
            }
        });
        
        renderCards();
    });

    // --- 4. Render Logic ---
    function renderCards() {
        const list = document.getElementById('cardList');
        const curTurno = getTurno();
        
        document.getElementById('turnoDisp').innerText = curTurno;
        document.getElementById('turnoDisp').classList.add('turno-on');

        const keys = Object.keys(act);
        const sorted = keys.sort((a,b) => {
            const iA = act[a], iB = act[b];
            const myA = (iA.takenBy === myId), myB = (iB.takenBy === myId);
            if(myA && !myB) return -1;
            if(!myA && myB) return 1;
            if(iA.status === 'orange' && iB.status !== 'orange') return -1;
            if(iA.status !== 'orange' && iB.status === 'orange') return 1;
            return (iA.startA || 0) - (iB.startA || 0);
        });

        list.innerHTML = sorted.length ? '' : '<div style="text-align:center; padding:40px; color:#8e8e93; font-weight:800;">NESSUNA CHIAMATA</div>';

        sorted.forEach(id => {
            const item = act[id];
            const isMine = item.takenBy === myId;
            const isOthers = item.status === 'red' && !isMine;
            const isFuori = (id.startsWith('FUORI_'));
            
            const card = document.createElement('div');
            card.className = `card status-${item.status} ${isOthers ? 'taken-by-others' : ''} ${isFuori ? 'is-fuori' : ''}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="m-id">${isFuori ? 'ATTIVITÀ FUORI' : id}</div>
                    <div class="m-time">${new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
                <div class="card-body">${item.causale || (item.status === 'orange' ? '⚠️ Richiesta A-Side' : '🔧 Lavorazione in corso...')}</div>
                <div class="card-footer">
                    <div class="tech-info">${isOthers ? 'OCCUPATO: '+(item.techName||'TECH') : (isMine ? '✅ IN CARICO A TE' : '⌛ IN ATTESA')}</div>
                    ${!isOthers ? `
                        <button class="btn ${item.status === 'orange' ? 'btn-take' : 'btn-close'}" onclick="doAction('${id}')">
                            ${item.status === 'orange' ? 'PRENDI' : 'CHIUDI'}
                        </button>
                    ` : ''}
                </div>
            `;
            list.appendChild(card);
        });
    }

    // --- 5. Actions ---
    function doAction(id) {
        const sTime = firebase.database.ServerValue.TIMESTAMP;
        if (act[id].status === 'orange') {
            db.ref('active_calls/'+id).update({ 
                status: 'red', startD: sTime, takenBy: myId, techName: uName 
            });
        } else {
            if (id.startsWith('FUORI_')) {
                currentEndingFuoriId = id;
                document.getElementById('modalFuori').style.display = 'flex';
            } else {
                const now = Date.now() + serverTimeOffset;
                saveToLog(id, act[id].causale || "Riparazione", act[id].startA, act[id].startD, now, uName);
                db.ref('active_calls/'+id).remove();
            }
        }
    }

    // --- Fuori Linea 特有逻辑 ---
    let currentEndingFuoriId = "";
    function startFuori() {
        const id = 'FUORI_' + Date.now();
        const sTime = firebase.database.ServerValue.TIMESTAMP;
        db.ref('active_calls/'+id).set({
            status: 'red', startA: sTime, startD: sTime, 
            takenBy: myId, techName: uName, turno: getTurno(),
            causale: "Attività manuale / Pulizia"
        });
    }

    function confirmEndFuori() {
        const msg = document.getElementById('inputFuoriCausale').value.trim() || "Attività Fuori Linea";
        const item = act[currentEndingFuoriId];
        const now = Date.now() + serverTimeOffset;
        saveToLog("FUORI", msg, item.startA, item.startD, now, uName);
        db.ref('active_calls/'+currentEndingFuoriId).remove();
        document.getElementById('modalFuori').style.display = 'none';
        document.getElementById('inputFuoriCausale').value = "";
    }

    // --- 6. Archive & Helper ---
    function saveToLog(id, cau, sA, sD, end, tech) {
        logs.push({
            id: id,
            day: new Date(end).toLocaleDateString('it-IT'),
            time: new Date(sA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            w: Math.round((sD - sA) / 60000), // Wait
            d: Math.round((end - sD) / 60000), // Work
            c: cau,
            t: tech
        });
        localStorage.setItem('logs_v19', JSON.stringify(logs));
    }

    function openReg() {
        const scroll = document.getElementById('logScroll');
        scroll.innerHTML = '';
        const days = [...new Set(logs.map(l => l.day))].reverse();
        days.forEach(day => {
            const dLogs = logs.filter(l => l.day === day).reverse();
            const div = document.createElement('div');
            div.innerHTML = `<div class="day-label">${day}</div><table>
                ${dLogs.map(l => `<tr><td style="font-weight:900">${l.id}</td><td>${l.time}</td><td>${l.w}/${l.d}m</td><td style="text-align:left">${l.c}</td></tr>`).join('')}
            </table>`;
            scroll.appendChild(div);
        });
        document.getElementById('v').style.display = 'flex';
    }

    function shareLogs() {
        let txt = `REPORT ${uName}\n`;
        logs.slice(-15).forEach(l => txt += `${l.day} ${l.id}: ${l.time} (W:${l.w} D:${l.d}) ${l.c}\n`);
        window.open(`whatsapp://send?text=${encodeURIComponent(txt)}`);
    }

    function openNameModal() { document.getElementById('inputName').value = uName; document.getElementById('modalName').style.display = 'flex'; }
    function saveName() { uName = document.getElementById('inputName').value || 'User'; localStorage.setItem('userName', uName); document.getElementById('userNameDisp').innerText = uName; document.getElementById('modalName').style.display = 'none'; }
    function closeReg() { document.getElementById('v').style.display = 'none'; }
    function clearLogs() { if(confirm("Svuota registro?")) { logs = []; localStorage.removeItem('logs_v19'); openReg(); } }

    document.getElementById('userNameDisp').innerText = uName;
</script>
</body>
</html>
