<script>
    const firebaseConfig={apiKey:"AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",authDomain:"luxottica-app.firebaseapp.com",databaseURL:"https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",projectId:"luxottica-app",appId:"1:288317846374:web:c8ec72c5ecd910840f4ea7"};
    firebase.initializeApp(firebaseConfig); const db=firebase.database();
    let serverTimeOffset=0, isPermanentlyLocked=false, curPiano=1, currentUserName=localStorage.getItem('userName')||'Hu_Shan';
    let myShift=localStorage.getItem('deviceShift')||"Turno A", myDeviceId=localStorage.getItem('deviceId')||('dev_'+Math.random().toString(36).substr(2,9));

    function getRealTimeTurno(){const n=new Date(Date.now()+serverTimeOffset), h=n.getHours()+(n.getMinutes()/60), b=new Date(2025,11,29), w=Math.floor((n-b)/(7*24*60*60*1000))+1; return (w%2!==0)?(h>=14.25?"Turno A":"Turno B"):(h>=14.25?"Turno B":"Turno A");}

    function handleMachineClick(id) {
        if(isPermanentlyLocked)return; const sTime=firebase.database.ServerValue.TIMESTAMP; const item=act[id]; if(!item)return;
        if(item.status==='orange'){
            if(confirm(`Prendere in carico la linea ${id.toUpperCase()}?`)){
                db.ref('active_calls/'+id).update({status:'purple', takenBy:myDeviceId, techName:currentUserName});

        }
    }

    function archiveIntervention(id, causale, startA, startB, endT, tech) {
        const d=new Date(endT), dk=d.toISOString().split('T')[0], nL={i:id, day:d.toLocaleDateString('it-IT'), s:new Date(startA).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), tA:Math.round((startB-startA)/60000), tD:Math.round((endT-startB)/60000), st:startA, c:causale, tech:tech};

        if(id!=='FUORI') db.ref(`history/${dk}/${id}_${endT}`).set({id,startA,startB,endT,causale,techName:tech,status:'completed',turno:getRealTimeTurno()});
    }

    function toggleFuori(){if(isPermanentlyLocked)return; const sT=firebase.database.ServerValue.TIMESTAMP, fs=act['FUORI']; if(fs&&fs.status==='red'&&fs.takenBy===myDeviceId){document.getElementById('fuoriModal').style.display='flex';}else if(!fs){db.ref('active_calls/FUORI').set({status:'red',startA:sT,startB:sT,takenBy:myDeviceId,techName:currentUserName,turno:getRealTimeTurno()});}}
    function saveFuoriCausale(){const v=document.getElementById('fuoriCausaleInput').value.trim()||"Extra", fs=act['FUORI'], n=Date.now()+serverTimeOffset; archiveIntervention('FUORI',v,fs.startA,fs.startA,n,currentUserName); db.ref('active_calls/FUORI').remove(); document.getElementById('fuoriModal').style.display='none';}

    function renderGrid(){
        const gd=document.getElementById('g'); gd.innerHTML=''; const isW=(myShift===getRealTimeTurno())&&!isPermanentlyLocked;
        const allO=Object.keys(act).filter(k=>k!=='FUORI'&&act[k].status==='orange').sort((a,b)=>act[a].startA-act[b].startA); const c=themeConfig[curPiano];
        pianoData[curPiano].forEach(i=>{
            const w=document.createElement('div'); w.className='btn-wrap'; const b=document.createElement('button'); b.className='btn-machine'; b.innerText=i; const s=isW?act[i]:null;
            if(s){
                if(s.status==='orange'){ b.classList.add('waiting'); const bd=document.createElement('div'); bd.className='badge'; bd.innerText=allO.indexOf(i)+1; w.appendChild(bd); }
                else if(s.status==='purple'){ if(s.takenBy===myDeviceId)b.classList.add('prep-purple'); else b.classList.add('locked-btn'); }
                else if(s.status==='red'){ if(s.takenBy===myDeviceId)b.classList.add('or'); else b.classList.add('locked-btn'); }
            } else { b.style.color=c; }
            b.onclick=()=>isW&&handleMachineClick(i); w.appendChild(b); gd.appendChild(w);
        });
        const infoL=document.getElementById('pianoInfoList'); infoL.innerHTML='';
        if(isW){
            pianoData[curPiano].filter(id=>act[id]&&(act[id].status==='orange'||act[id].status==='purple')).forEach(id=>{
                let txt=act[id].causale||"-"; const m=txt.match(/Cambio\s+([A-Z0-9\s]+)/i);
                if(m) txt=txt.replace(m[1],`<span class="clickable-modello" onclick="quickJump('${m[1].replace(/\s+/g,'').toUpperCase()}')">${m[1]}</span>`);
                infoL.innerHTML+=`<div class="info-row" style="color:${c}"><span>Linea ${id}</span><span>${txt}</span></div>`;
            });
        }
    }

    // --- 款式数据库逻辑 ---
    async function handleModelloSearch(v){if(mEditMode)return; const id=v.replace(/\s+/g,'').toUpperCase(); if(!id){resetModForm(); return;} const snap=await db.ref(`modelli_db/${id}/current`).once('value'); const hSnap=await db.ref(`modelli_db/${id}/history`).once('value');
        if(snap.exists()){ const d=snap.val(); currentModData=d; ['mac','pos','lam','pan','sca','quo','not'].forEach(k=>document.getElementById('m_'+k).value=d[k]||d[k==='mac'?'macchina':k==='not'?'note':k]||""); syncDisplayValues(); document.getElementById('mCreaBtn').classList.add('btn-disabled');
            let hTm=""; if(hSnap.exists()){ Object.values(hSnap.val()).reverse().forEach(h=>{ const dt=new Date(h.at).toLocaleDateString(); hTm+=`<div class="history-item"><span>${h.type==='crea'?'[CREATO]':'[AGG]'}</span> da <b>${h.by}</b> il ${dt}</div>`;}); } document.getElementById('mHistoryBox').innerHTML=hTm;
        }else{resetModForm(false); document.getElementById('mCreaBtn').classList.remove('btn-disabled'); document.getElementById('mHistoryBox').innerHTML="Modello Nuovo.";}
    }
    function handleModAction(m){ const id=document.getElementById('mSearchInput').value.toUpperCase(); if(!id)return; if(mEditMode===m){ saveModello(id,m); }else{ mEditMode=m; document.getElementById('mFormContainer').classList.add('editing'); document.getElementById(m==='crea'?'mAggiornaBtn':'mCreaBtn').classList.add('btn-disabled');}}
    async function saveModello(id,t){ if(!confirm("Salvare?"))return; const nD={macchina:document.getElementById('m_mac').value,posaggio:document.getElementById('m_pos').value,lama:document.getElementById('m_lam').value,panto:document.getElementById('m_pan').value,scarico:document.getElementById('m_sca').value,quota:document.getElementById('m_quo').value,note:document.getElementById('m_not').value,at:Date.now(),by:currentUserName};
        await db.ref(`modelli_db/${id}/current`).set(nD); await db.ref(`modelli_db/${id}/history`).push({type:t,at:Date.now(),by:currentUserName}); alert("OK!"); mEditMode=null; document.getElementById('mFormContainer').classList.remove('editing'); resetModButtons(); handleModelloSearch(id);
    }
    function resetModForm(f=true){if(f)document.getElementById('mSearchInput').value="";['m_mac','m_pos','m_lam','m_pan','m_sca','m_quo','m_not'].forEach(i=>document.getElementById(i).value="");syncDisplayValues();}
    function resetModButtons(){mEditMode=null;document.getElementById('mCreaBtn').classList.remove('btn-disabled');document.getElementById('mAggiornaBtn').classList.remove('btn-disabled');}
    function syncDisplayValues(){['mac','pos','lam','pan','sca','quo','not'].forEach(k=>{const v=document.getElementById('m_'+k).value||"-";document.getElementById('v_'+k).innerText=v;});}
    function quickJump(mId){showModelli();document.getElementById('mSearchInput').value=mId;handleModelloSearch(mId);}

    function updateGlobalBadges(){const isW=(myShift===getRealTimeTurno())&&!isPermanentlyLocked; for(let p=1;p<=5;p++){const b=document.getElementById(`p-btn-${p}`), count=isW?pianoData[p].filter(id=>act[id]&&(act[id].status==='orange'||act[id].status==='red'||act[id].status==='purple')).length:0; const ob=b.querySelector('.p-badge'); if(ob)ob.remove(); if(count>0){const nb=document.createElement('div');nb.className='p-badge';b.appendChild(nb);}}}
    function switchPiano(p,dir='left'){if(p===curPiano||isPermanentlyLocked)return; const gd=document.getElementById('g'); gd.className=(dir==='left'?'slide-left':'slide-right'); setTimeout(()=>{curPiano=p;applyTheme();gd.className='';},150);}
    function applyTheme(){const c=themeConfig[curPiano]; document.querySelectorAll('.p-btn').forEach((b,i)=>{const isT=(i+1===curPiano); b.style.backgroundColor=isT?(isPermanentlyLocked?'#8e8e93':c):'#f2f2f7'; b.style.color=isT?'#fff':'#8e8e93'; b.classList.toggle('active',isT);}); document.getElementById('floorColor').value=c; renderGrid();}
    function updateThemeColor(c){if(isPermanentlyLocked)return; themeConfig[curPiano]=c; localStorage.setItem('pianoThemes',JSON.stringify(themeConfig)); applyTheme();}
    function renderLogs(){
        const ct=document.getElementById('logContainer'); ct.innerHTML=''; const oggi=new Date(Date.now()+serverTimeOffset).toLocaleDateString('it-IT');
        dayHistory.sort((a,b)=>b.split('/').reverse().join('').localeCompare(a.split('/').reverse().join(''))).forEach(day=>{
            const s=document.createElement('div'); const isC=(day!==oggi); s.className='day-section'+(isC?' collapsed':'');
            const dL=logs.filter(l=>l.day===day).sort((a,b)=>b.st-a.st);
            s.innerHTML=`<div class="day-header" onclick="this.parentElement.classList.toggle('collapsed')"><div class="day-del-btn" onclick="openDayDelConfirm(event,'${day}')">×</div><span>${day}</span></div><div class="day-content"><table><thead><tr><th style="width:20%">LINEA</th><th style="width:20%">INIZIO</th><th style="width:25%">A & D</th><th>CAUSALE</th></tr></thead><tbody>${dL.map(l=>`<tr><td><b>${l.i}</b></td><td>${l.s}</td><td style="font-size:11px;color:#8e8e93;font-weight:700;">A:${l.tA}m / D:${l.tD}m</td><td>${l.c}</td></tr>`).join('')}</tbody></table></div>`;
            ct.appendChild(s);
        });
    }
    function openDayDelConfirm(e,d){e.stopPropagation();document.getElementById('dayConfirmModal').style.display='flex';document.getElementById('confirmDayDelBtn').onclick=()=>{logs=logs.filter(l=>l.day!==d);dayHistory=dayHistory.filter(h=>h!==d);localStorage.setItem('logs_v7',JSON.stringify(logs));localStorage.setItem('dayHistory_v7',JSON.stringify(dayHistory));renderLogs();document.getElementById('dayConfirmModal').style.display='none';};}
    function handleNameClick(){document.getElementById('nameInput').value=currentUserName;document.getElementById('nameModal').style.display='flex';}
    function saveName(){let n=document.getElementById('nameInput').value.trim();if(n){currentUserName=n;localStorage.setItem('userName',n);document.getElementById('userNameDisp').innerText=n;document.getElementById('regNameDisp').innerText=n;}document.getElementById('nameModal').style.display='none';}
    function showMemoria(){renderLogs();document.getElementById('v').style.display='flex';}
    function closeMemoria(){document.getElementById('v').style.display='none';}
    function openConfirm(){document.getElementById('confirmModal').style.display='flex';}
    function doClear(){logs=[];dayHistory=[];localStorage.setItem('logs_v7','[]');localStorage.setItem('dayHistory_v7','[]');renderLogs();document.getElementById('confirmModal').style.display='none';}
    async function shareRegistro(){if(logs.length===0)return; let t=`REGISTRO - ${currentUserName}\n`; logs.forEach(l=>{t+=`${l.day} ${l.i}: ${l.s} | ${l.c}\n`;}); if(navigator.share) await navigator.share({title:`Registro`,text:t});}
    const pianoData={1:['101','101bis','102','102bis','103','103bis','104','104bis','105','105bis','106','106bis','107','107bis','108','108bis'],2:['201','201bis','202','202bis','203','203bis','204','204bis','205','205bis','206','206bis','207','207bis','208','208bis'],3:['301','301bis','302','302bis','303','303bis','304','304bis','305','305bis','306','306bis','307','307bis','308','308bis'],4:['401','401bis','402','402bis','403','403bis','404','404bis','405','405bis','406','406bis','407','407bis','408','408bis'],5:['501','501bis','502','502bis','503','503bis','504','504bis','505','505bis','506','506bis','507','507bis','508','508bis']};
    document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;},{passive:true});
    document.addEventListener('touchend',e=>{if(document.getElementById('v').style.display==='flex'||isPermanentlyLocked)return; let dX=e.changedTouches[0].screenX-touchStartX; if(Math.abs(dX)>70)dX>0?(curPiano>1&&switchPiano(curPiano-1,'right')):(curPiano<5&&switchPiano(curPiano+1,'left'));},{passive:true});
    document.getElementById('userNameDisp').innerText=document.getElementById('regNameDisp').innerText=currentUserName;
    document.getElementById('curYear').innerText=new Date().getFullYear(); applyTheme();
    setInterval(()=>{db.ref(".info/serverTimeOffset").once("value").then((snap)=>{serverTimeOffset=snap.val()||0; checkSecurity(); renderGrid(); updateGlobalBadges();});},10000);
    function showModelli(){document.getElementById('modelli_v1').style.display='flex';}
    function closeModelli(){document.getElementById('modelli_v1').style.display='none';mEditMode=null;document.getElementById('mFormContainer').classList.remove('editing');resetModButtons();}
</script>
</body>
</html>
