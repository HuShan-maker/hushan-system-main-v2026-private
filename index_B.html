<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>B - Technician Side v18.9.20</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { 
            --bg: #ffffff; --card: #e5e5ea; --red: #ff3b30; --orange: #ff9500; 
            --btn-gray: #f2f2f7; --locked-gray-red: #bb8888; --green: #34c759;
        }
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: #000; 
            padding: calc(15px + env(safe-area-inset-top)) 20px 20px 20px; 
            margin: 0; transition: 0.4s; overflow-x: hidden; touch-action: pan-y; 
        }

        /* 状态标签 */
        .turno-badge { 
            font-size: 11px; font-weight: 800; color: #fff; background: #8e8e93; 
            padding: 3px 10px; border-radius: 6px; margin-left: 8px; text-transform: uppercase; 
            vertical-align: middle; transition: background 0.3s;
        }
        .turno-on { background: var(--green) !important; box-shadow: 0 0 8px rgba(52, 199, 89, 0.4); }
        .shift-lock-ui { opacity: 0.6; pointer-events: none; filter: grayscale(1); }

        /* 页面框架 */
        .h { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 35px; }
        h2 { margin: 0; font-size: 16px; font-weight: 800; text-transform: uppercase; line-height: 1.1; display: flex; align-items: center; }
        .user-subtitle { font-size: 14px; color: #8e8e93; font-weight: 600; margin-top: 5px; height: 25px; display: flex; align-items: center; cursor: pointer; min-width: 50px; }
        .reg-btn { background: #000; color: #fff; font-size: 11px; border: none; padding: 0 14px; border-radius: 9px; font-weight: 700; height: 25px; display: flex; align-items: center; text-transform: uppercase; }
        
        /* 钢琴 */
        .pianos { display: flex; gap: 5px; margin-bottom: 25px; padding: 12px 0 8px 0; overflow: visible; }
        .p-btn { flex: 1; background: var(--btn-gray); color: #8e8e93; border: none; padding: 10px 0; border-radius: 12px; font-weight: 700; font-size: 10px; transition: 0.2s; position: relative; }
        .p-btn.active { color: #fff !important; }
        .p-badge { position: absolute; top: -5px; right: -5px; background: var(--red); width: 13px; height: 13px; border-radius: 50%; border: 2px solid white; z-index: 10; animation: pulse 1.5s infinite; }

        /* 网格 */
        #g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-left { transform: translateX(-30px); opacity: 0; }
        .slide-right { transform: translateX(30px); opacity: 0; }
        .btn-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .btn-machine { width: 100%; height: 100%; border: none; border-radius: 24px; font-weight: 800; font-size: 17px; background: var(--btn-gray); transition: all 0.3s; }
        .badge { position: absolute; top: -4px; right: -4px; width: 22px; height: 22px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; z-index: 10; }

        /* 颜色状态 */
        .or { background: var(--red) !important; color: #fff !important; animation: pulse 1.5s infinite; }
        .waiting { background: var(--orange) !important; color: #fff !important; animation: pulse 1.5s infinite; }
        .locked-btn { background: var(--locked-gray-red) !important; color: rgba(255, 255, 255, 0.8) !important; opacity: 0.8; pointer-events: none; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.97); opacity: 0.8; } }

        .bottom-area { display: flex; justify-content: center; margin-top: 20px; padding-bottom: 30px; }
        .fuori-btn { background: var(--btn-gray); border: none; border-radius: 18px; font-size: 14px; font-weight: 800; height: 65px; width: calc(50% + 6px); text-transform: uppercase; transition: 0.3s; }
        
        .color-picker-wrap { position: fixed; right: 20px; bottom: 40px; z-index: 50; width: 40px; height: 40px; background: rgba(0,0,0,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #floorColor { width: 24px; height: 24px; border: none; padding: 0; background: none; border-radius: 50%; overflow: hidden; cursor: pointer; }
        
        /* Modals & Registro (合并相同样式的 Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 400; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 85%; padding: 25px; border-radius: 30px; text-align: center; }
        .modal-content input { width: 90%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 18px; text-align: center; background: #f9f9f9; outline: none; -webkit-user-select: text; user-select: text; }
        .modal-btn { background: #000; color: #fff; padding: 15px; border-radius: 15px; font-weight: 700; width: 100%; font-size: 16px; border: none; }
        
        #v { background: #fff; display: none; flex-direction: column; z-index: 300; position: fixed; top: 0; left: 0; width: 100%; height: 100%; padding-top: calc(15px + env(safe-area-inset-top)); }
        .v-nav { display: flex; align-items: center; justify-content: space-between; height: 55px; padding: 8px 20px 0 20px; flex-shrink: 0; border-bottom: 1px solid #f2f2f7; }
        .back-arrow { font-size: 28px; width: 45px; cursor: pointer; display: flex; align-items: center; height: 100%; }
        .v-h2 { font-size: 18px; font-weight: 900; text-transform: uppercase; position: absolute; left: 0; right: 0; text-align: center; margin: 0; pointer-events: none; }
        
        #logContainer { flex: 1; overflow-y: auto; padding: 5px 15px 15px 15px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; } 
        th, td { padding: 12px 2px; text-align: center; font-size: 14px; border-bottom: 1px solid #f2f2f7; }
        th { color: #8e8e93; font-size: 9px; text-transform: uppercase; background: #fff; position: sticky; top: 0; z-index: 10; }
        .t-a { color: var(--orange); font-weight: 800; }
        .t-d { color: var(--red); font-weight: 800; }
        .copy-text { text-align: center; font-size: 11px; color: #000; margin-top: 5px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="h">
        <div class="title-group">
            <h2>OPERATORE <span id="turnoDisp" class="turno-badge">--</span></h2>
            <div id="userNameDisp" class="user-subtitle" onclick="handleUI('name')">Hu_Shan</div>
        </div>
        <button class="reg-btn" onclick="handleUI('showReg')">registro</button>
    </div>

    <div class="pianos" id="pianoBtns">
        <button class="p-btn active" onclick="switchPiano(1)">Piano 1</button>
        <button class="p-btn" onclick="switchPiano(2)">Piano 2</button>
        <button class="p-btn" onclick="switchPiano(3)">Piano 3</button>
        <button class="p-btn" onclick="switchPiano(4)">Piano 4</button>
        <button class="p-btn" onclick="switchPiano(5)">Piano 5</button>
    </div>

    <div id="dynamicContent">
        <div id="g"></div>
        <div class="bottom-area"><button id="btn-fuori" class="fuori-btn" onclick="toggleFuori()">FUORI LINEA</button></div>
    </div>

    <div class="color-picker-wrap"><input type="color" id="floorColor" onchange="updateThemeColor(this.value)"></div>

    <!-- Modals -->
    <div id="nameModal" class="modal-overlay"><div class="modal-content"><h3>Cambia Nome</h3><input type="text" id="nameInput"><button class="modal-btn" onclick="saveName()">SALVA</button></div></div>
    <div id="editModal" class="modal-overlay"><div class="modal-content"><h3>Modifica</h3><input type="text" id="editCausaleInput"><button class="modal-btn" onclick="confirmEdit()">AGGIORNA</button></div></div>
    <div id="confirmModal" class="modal-overlay"><div class="modal-content"><h3>Svuota tutto?</h3><div style="display:flex;gap:15px;margin-top:10px;"><button style="background:#e5e5ea;flex:1;" class="modal-btn" onclick="handleUI('hideConfirm')">NO</button><button style="background:var(--red);flex:1;" class="modal-btn" onclick="doClear()">SI</button></div></div></div>
    <div id="dayConfirmModal" class="modal-overlay"><div class="modal-content"><h3>Cancellare giorno?</h3><div style="display:flex;gap:15px;margin-top:10px;"><button style="background:#e5e5ea;flex:1;" class="modal-btn" onclick="handleUI('hideDayConfirm')">NO</button><button id="confirmDayDelBtn" style="background:var(--red);flex:1;" class="modal-btn">SI</button></div></div></div>

    <div id="v">
        <div class="v-nav">
            <div class="back-arrow" onclick="handleUI('hideReg')">←</div>
            <h2 class="v-h2">REGISTRO INTERVENTI</h2>
            <div id="regNameDisp" style="font-size:12px; font-weight:600; width:80px; text-align:right; color:#8e8e93;">Hu_Shan</div>
        </div>
        <div id="logContainer"></div>
        <div class="v-footer" style="padding:15px; border-top:1px solid #f2f2f7;">
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:8px;">
                <button class="bottom-action-btn clear-btn" onclick="handleUI('showConfirm')">Svuota tutto</button>
                <button class="bottom-action-btn export-btn" onclick="shareRegistro()">INVIO REGISTRO</button>
            </div>
            <div class="copy-text">© <span id="curYear"></span> Hu Shan. All rights reserved.</div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 状态管理 ---
    let myShift = localStorage.getItem('deviceShift') || "";
    while (!/Turno [AB]/.test(myShift)) {
        let c = prompt("Sei Turno A o B?");
        if (c && /^[ab]$/i.test(c)) {
            myShift = "Turno " + c.toUpperCase();
            localStorage.setItem('deviceShift', myShift);
        }
    }

    const myDeviceId = localStorage.getItem('deviceId') || (()=>{let id='dev_'+Math.random().toString(36).substr(2,9);localStorage.setItem('deviceId',id);return id;})();
    let currentUserName = localStorage.getItem('userName') || 'Hu_Shan';
    let themeConfig = JSON.parse(localStorage.getItem('pianoThemes') || '{"1":"#000000","2":"#0077b6","3":"#1b5e20","4":"#311b92","5":"#c2185b"}');
    let logs = JSON.parse(localStorage.getItem('logs_v7') || '[]');
    let dayHistory = JSON.parse(localStorage.getItem('dayHistory_v7') || '[]');
    let undoStack = [], curPiano = 1, editIndex = -1, clickCount = 0, clickTimer = null, nameClickCount = 0, nameClickTimer = null, touchStartX = 0;

    const pianoData = { 
        1: ['101','101bis','102','102bis','103','103bis','104','104bis','105','105bis','106','106bis','107','107bis','108','108bis'], 
        2: ['201','201bis','202','202bis','203','203bis','204','204bis','205','205bis','206','206bis','207','207bis','208','208bis'], 
        3: ['301','301bis','302','302bis','303','303bis','304','304bis','305','305bis','306','306bis','307','307bis','308','308bis'], 
        4: ['401','401bis','402','402bis','403','403bis','404','404bis','405','405bis','406','407','407bis','408','408bis'],
        5: ['501','501bis','502','502bis','503','503bis','504','504bis','505','505bis','506','506bis','507','507bis','508','508bis']
    };

    // --- 核心逻辑 ---
    function getRealTimeTurno() {
        const now = new Date(), hour = now.getHours() + (now.getMinutes()/60);
        const start = new Date(now.getFullYear(), 0, 1);
        const week = Math.ceil((((now - start)/86400000) + start.getDay()+1)/7);
        const isSingle = week % 2 !== 0, isPM = hour >= 14.25;
        return isSingle ? (isPM ? "Turno A" : "Turno B") : (isPM ? "Turno B" : "Turno A");
    }

    db.ref('active_calls').on('value', snap => {
        act = snap.val() || {};
        renderGrid(); updateGlobalBadges(); applyTheme();
    });

    function save() { localStorage.setItem('logs_v7', JSON.stringify(logs)); localStorage.setItem('dayHistory_v7', JSON.stringify(dayHistory)); }

    function handleMachineClick(id) {
        const now = Date.now(), s = act[id];
        if (!s) return;
        if (s.status === 'orange') {
            db.ref('active_calls/' + id).update({ status: 'red', startD: now, startB: now, takenBy: myDeviceId });
        } else if (s.status === 'red' && s.takenBy === myDeviceId) {
            let startD = s.startD || s.startA;
            const entry = { i: id, day: new Date().toLocaleDateString('it-IT'), s: new Date(s.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), tA: Math.round((startD - s.startA)/60000), tD: Math.round((now - startD)/60000), st: s.startA, c: s.causale || "-" };
            logs.push(entry); if(!dayHistory.includes(entry.day)) dayHistory.push(entry.day);
            save();
            id === 'FUORI' ? db.ref('active_calls/FUORI').remove() : db.ref('active_calls/' + id).update({ status: 'completed', endT: now });
        }
    }

    function renderGrid() {
        const gd = document.getElementById('g'), badge = document.getElementById('turnoDisp'), content = document.getElementById('dynamicContent');
        const rt = getRealTimeTurno(), isWorking = (myShift === rt);
        badge.innerText = myShift;
        isWorking ? (content.classList.remove('shift-lock-ui'), badge.classList.add('turno-on')) : (content.classList.add('shift-lock-ui'), badge.classList.remove('turno-on'));

        const orangeIds = Object.keys(act).filter(k => k!=='FUORI' && act[k].status==='orange').sort((a,b)=>act[a].startA-act[b].startA);
        gd.innerHTML = pianoData[curPiano].map(i => {
            const s = isWorking ? act[i] : null;
            let cls = 'btn-machine', style = `color:${themeConfig[curPiano]}`;
            if (s && s.status === 'orange') cls += ' waiting';
            else if (s && s.status === 'red') s.takenBy === myDeviceId ? cls += ' or' : cls += ' locked-btn';
            
            return `<div class="btn-wrap">
                <button class="${cls}" style="${(s && (s.status==='orange'||(s.status==='red'&&s.takenBy===myDeviceId))) ? '' : style}" onclick="handleMachineClick('${i}')">${i}</button>
                ${(s && s.status==='orange') ? `<div class="badge">${orangeIds.indexOf(i)+1}</div>` : ''}
            </div>`;
        }).join('');

        const f = document.getElementById('btn-fuori'), fs = isWorking ? act['FUORI'] : null;
        f.className = (fs && (fs.status==='red'||fs.status==='orange')) ? 'fuori-btn or' : 'fuori-btn';
        if (!(fs && (fs.status==='red'||fs.status==='orange'))) f.style.color = themeConfig[curPiano];
    }

    // --- 界面交互 (合并重复逻辑) ---
    function handleUI(cmd, data) {
        const modals = { name: 'nameModal', edit: 'editModal', confirm: 'confirmModal', day: 'dayConfirmModal' };
        if (cmd === 'name') { 
            nameClickCount++;
            if(nameClickCount === 2) { 
                document.getElementById('nameInput').value = currentUserName;
                document.getElementById('nameModal').style.display = 'flex';
                nameClickCount = 0; clearTimeout(nameClickTimer);
            } else { nameClickTimer = setTimeout(()=>nameClickCount=0, 350); }
        }
        if (cmd === 'showReg') { renderLogs(); document.getElementById('v').style.display='flex'; }
        if (cmd === 'hideReg') document.getElementById('v').style.display='none';
        if (cmd === 'showConfirm') document.getElementById('confirmModal').style.display='flex';
        if (cmd === 'hideConfirm') document.getElementById('confirmModal').style.display='none';
        if (cmd.startsWith('hide')) document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none');
    }

    function switchPiano(p) {
        if(p === curPiano) return;
        const dir = p > curPiano ? 'slide-left' : 'slide-right';
        document.getElementById('g').className = dir;
        setTimeout(() => { curPiano = p; applyTheme(); document.getElementById('g').className = ''; }, 150);
    }

    function applyTheme() {
        document.querySelectorAll('.p-btn').forEach((b, i) => {
            const act = (i+1 === curPiano);
            b.style.backgroundColor = act ? themeConfig[curPiano] : '';
            b.classList.toggle('active', act);
        });
        document.getElementById('floorColor').value = themeConfig[curPiano];
        renderGrid();
    }

    function renderLogs() {
        const container = document.getElementById('logContainer'), oggi = new Date().toLocaleDateString('it-IT');
        const groups = {}; dayHistory.forEach(d => groups[d] = []);
        logs.forEach((l, idx) => groups[l.day] && groups[l.day].push({...l, idx}));
        
        container.innerHTML = Object.keys(groups).sort((a,b) => b.split('/').reverse().join('').localeCompare(a.split('/').reverse().join(''))).map(day => {
            const dayLogs = groups[day].sort((a,b) => b.st - a.st);
            return `<div class="day-section ${day !== oggi ? 'collapsed' : ''}">
                <div class="day-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <div class="day-header-left"><div class="day-del-btn" onclick="openDayDelConfirm(event, '${day}')">×</div><span>${day}</span></div>
                </div>
                <div class="day-content">
                    <table>
                        <thead><tr><th>LINEA</th><th>INIZIO</th><th>A & D</th><th>CAUSALE</th><th><span class="undo-btn" onclick="performUndo(event)">↺</span></th></tr></thead>
                        <tbody>${dayLogs.map(l => `<tr><td><b>${l.i === 'FUORI' ? 'F. Linea' : l.i}</b></td><td>${l.s}</td><td><div class="time-cell"><span class="t-a">A: ${l.tA}m</span><span class="t-d">D: ${l.tD}m</span></div></td><td><span class="editable-causale" onclick="handleCausaleClick(${l.idx})">${l.c}</span></td><td class="del-row" onclick="deleteRow(${l.idx})">×</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>`;
        }).join('');
    }

    // --- 剩下的必要功能代码保持原样 (saveName, confirmEdit, shareRegistro, toggleFuori, etc.) ---
    function saveName() { let n = document.getElementById('nameInput').value.trim(); if(n){ currentUserName = n; localStorage.setItem('userName',n); document.getElementById('userNameDisp').innerText=n; document.getElementById('regNameDisp').innerText=n; } handleUI('hide'); }
    function handleCausaleClick(i) { clickCount++; if(clickCount === 2) { editIndex = i; document.getElementById('editCausaleInput').value=logs[i].c; document.getElementById('editModal').style.display='flex'; clickCount=0; } else { setTimeout(()=>clickCount=0, 350); } }
    function confirmEdit() { logs[editIndex].c = document.getElementById('editCausaleInput').value.trim() || "-"; save(); handleUI('hide'); renderLogs(); }
    function deleteRow(i) { undoStack.push({l:JSON.parse(JSON.stringify(logs)), h:[...dayHistory]}); logs.splice(i,1); save(); renderLogs(); }
    function performUndo(e) { e.stopPropagation(); if(undoStack.length){ let last=undoStack.pop(); logs=last.l; dayHistory=last.h; save(); renderLogs(); } }
    function openDayDelConfirm(e, day) { e.stopPropagation(); document.getElementById('dayConfirmModal').style.display='flex'; document.getElementById('confirmDayDelBtn').onclick=()=>{ undoStack.push({l:JSON.parse(JSON.stringify(logs)), h:[...dayHistory]}); logs=logs.filter(l=>l.day!==day); dayHistory=dayHistory.filter(d=>d!==day); save(); handleUI('hide'); renderLogs(); }; }
    function doClear() { logs=[]; dayHistory=[]; save(); renderLogs(); handleUI('hide'); }
    function toggleFuori() { const now = Date.now(); if(act['FUORI'] && act['FUORI'].status !== 'completed') { handleMachineClick('FUORI'); } else { db.ref('active_calls/FUORI').set({ status: 'red', startA: now, startB: now, startD: now, takenBy: myDeviceId }); } }
    function updateThemeColor(c) { themeConfig[curPiano]=c; localStorage.setItem('pianoThemes',JSON.stringify(themeConfig)); applyTheme(); }
    function updateGlobalBadges() { const isWork = (myShift === getRealTimeTurno()); document.querySelectorAll('.p-btn').forEach((btn, i) => { const count = isWork ? pianoData[i+1].filter(id => act[id] && (act[id].status === 'orange' || act[id].status === 'red')).length : 0; let b = btn.querySelector('.p-badge'); if(count > 0) { if(!b) { b=document.createElement('div'); b.className='p-badge'; btn.appendChild(b); } } else if(b) b.remove(); }); }
    async function shareRegistro() { if(!logs.length) return; let text = `REGISTRO - ${currentUserName}\n`; logs.forEach(l => text += `${l.i}: ${l.s} | A:${l.tA}m | D:${l.tD}m | ${l.c}\n`); if(navigator.share) await navigator.share({ title: `Registro`, text }); }

    // 手势
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    document.addEventListener('touchend', e => { if (document.getElementById('v').style.display === 'flex') return; let deltaX = e.changedTouches[0].screenX - touchStartX; if (Math.abs(deltaX) > 70) deltaX > 0 ? (curPiano > 1 && switchPiano(curPiano - 1)) : (curPiano < 5 && switchPiano(curPiano + 1)); }, { passive: true });

    document.getElementById('userNameDisp').innerText = document.getElementById('regNameDisp').innerText = currentUserName;
    document.getElementById('curYear').innerText = new Date().getFullYear();
    applyTheme();
</script>
</body>
</html>
