<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='72' font-weight='900' fill='white'%3EA%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Link Diretto - A v8.5.9</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f8f9fa; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; --black: #000000; --blue: #007aff; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .container {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; width: 100%; max-width: 400px; margin: 0 auto;
        }

        .header { text-align: center; margin-bottom: 5px; }
        h1 { font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; color: var(--black); }

        /* 灰色反馈按钮 */
        .feedback-entry-btn {
            background: var(--gray); color: var(--black); border: none; padding: 6px 16px;
            border-radius: 20px; font-size: 10px; font-weight: 800; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s;
        }
        .feedback-entry-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* 调整输入区域：宽度设为 260px 与大按钮一致 */
        .input-card { 
            background: #fff; padding: 20px; border-radius: 25px; width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 15px;
        }

        .linea-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        input { 
            width: 100px; padding: 12px; border-radius: 15px; 
            border: 3px solid #f2f2f7; font-size: 24px; font-weight: 900; 
            text-align: center; outline: none; background: #fff;
            -webkit-user-select: text; user-select: text; 
        }
        input:disabled { background-color: #f9f9fb; color: #8e8e93; border-color: #e5e5ea; opacity: 1; }

        .turno-tag { font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; background: #f2f2f7; padding: 6px 12px; border-radius: 10px; }

        #causaleSelect {
            width: 100%; padding: 14px; border-radius: 12px;
            border: none; background: #f2f2f7; font-size: 14px;
            font-weight: 700; color: #3a3a3c; outline: none;
            cursor: pointer; text-align: center; -webkit-appearance: none;
        }

        .main-btn {
            width: 260px; height: 260px; border-radius: 50px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer;
        }

        .status-none { background: #fff; border: 4px solid #f2f2f7; color: #000; }
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        .status-red { background: var(--red); color: #fff; }
        .locked { pointer-events: none; transform: scale(0.97); opacity: 0.9; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }

        .btn-icon { font-size: 60px; margin-bottom: 10px; }
        .btn-text { font-size: 15px; font-weight: 900; text-transform: uppercase; text-align: center; padding: 0 25px; line-height: 1.2; }

        #cancelBtn {
            margin-top: 15px; background: #fff; border: 2px solid #e5e5ea;
            color: #8e8e93; font-size: 13px; font-weight: 800; text-transform: uppercase;
            padding: 12px 30px; border-radius: 15px; display: none;
        }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #fff; width: 90%; max-width: 340px; border-radius: 30px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .modal-h2 { font-size: 18px; font-weight: 900; text-align: center; margin: 0; color: var(--black); }
        .f-label { font-size: 11px; font-weight: 800; color: #8e8e93; margin-bottom: -10px; margin-left: 5px; text-transform: uppercase; }
        .f-select, .f-textarea, .f-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #f2f2f7; font-size: 15px; font-weight: 700; outline: none; -webkit-user-select: text; user-select: text; }
        .f-submit { background: var(--black); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; font-size: 14px; margin-top: 10px; }
        .f-close { color: #8e8e93; font-size: 12px; font-weight: 700; text-align: center; margin-top: 5px; }

        .copy-text { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; padding: 20px 0; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Link Diretto</h1>
            <button class="feedback-entry-btn" onclick="handleFeedbackOpen()">🎓 Crescita Tecnica</button>
        </div>

        <div class="input-card">
            <div class="linea-row">
                <input type="text" id="lineaInput" placeholder="NO." autocomplete="off" oninput="localStorage.setItem('persistentLinea', this.value)">
                <div class="turno-tag" id="turnoLabel">--</div>
            </div>
            
            <select id="causaleSelect">
                <option value="" disabled selected>-- SELEZIONA CAUSALE --</option>
                <option value="Faro">Faro</option>
                <option value="SGM Taglio">SGM Taglio</option>
                <option value="Avvitatore">Avvitatore</option>
                <option value="Lecureux">Lecureux</option>
                <option value="Stampiglia">Stampiglia</option>
                <option value="Oliatore">Oliatore</option>
                <option value="Cambio">Cambio</option>
            </select>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <button id="mainBtn" class="main-btn status-none" onclick="sendCall()">
                <div id="btnIcon" class="btn-icon">⚡️</div>
                <div id="statusText" class="btn-text">Chiamare Attrezzista</div>
            </button>
            <button id="cancelBtn" onclick="cancelCall()">Annulla Chiamata</button>
        </div>
    </div>

    <div class="copy-text">© <span id="curYear"></span> HU SHAN · ALL RIGHTS RESERVED</div>

    <div id="fModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-h2">Crescita Tecnica</h2>
            <div class="f-label">Attrezzista</div>
            <select id="fName" class="f-select">
                <option value="Shan">Shan</option>
                <option value="Martina">Martina</option>
                <option value="Mirco">Mirco</option>
                <option value="Almir">Almir</option>
                <option value="Nortine">Nortine</option>
            </select>
            <div class="f-label">Competenza (1-5)</div>
            <input type="number" id="fScore" class="f-input" min="1" max="5" placeholder="Valuta da 1 a 5">
            <div class="f-label">Note / Suggerimenti</div>
            <textarea id="fNote" class="f-textarea" rows="3" placeholder="Come possiamo migliorare?"></textarea>
            <button class="f-submit" onclick="submitFeedback()">INVIA FEEDBACK</button>
            <div class="f-close" onclick="document.getElementById('fModal').style.display='none'">CHIUDI</div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const mainBtn = document.getElementById('mainBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');
    const causaleSelect = document.getElementById('causaleSelect');
    const turnoLabel = document.getElementById('turnoLabel');

    function handleFeedbackOpen() {
        const now = new Date();
        const currentTime = now.getHours() + (now.getMinutes() / 60);
        if ((currentTime >= 12 && currentTime <= 14.25) || (currentTime >= 20 && currentTime <= 22.25)) {
            document.getElementById('fModal').style.display = 'flex';
        } else {
            alert("FUNZIONE NON ATTIVA.\n\nIl feedback è disponibile negli orari:\n- 12:00 - 14:15\n- 20:00 - 22:15");
        }
    }

    function submitFeedback() {
        const name = document.getElementById('fName').value;
        const score = document.getElementById('fScore').value;
        const note = document.getElementById('fNote').value;
        if(!score || score < 1 || score > 5) { alert("Inserisci un punteggio tra 1 e 5!"); return; }
        
        db.ref('feedback_crescita').push({
            attrezzista: name, punteggio: score, messaggio: note,
            timestamp: Date.now(), linea: lineaInput.value || "N/A", data: new Date().toLocaleDateString('it-IT')
        }).then(() => {
            alert("Feedback inviato con successo!");
            document.getElementById('fModal').style.display = 'none';
            document.getElementById('fScore').value = ""; document.getElementById('fNote').value = "";
        });
    }

    function getActiveTurno() {
        const now = new Date();
        const hour = now.getHours() + (now.getMinutes() / 60);
        const baseDate = new Date(2025, 11, 29); 
        const msPerWeek = 7 * 24 * 60 * 60 * 1000;
        const totalWeeks = Math.floor((now - baseDate) / msPerWeek) + 1;
        const isSingleWeek = totalWeeks % 2 !== 0; 
        const isAfternoon = (hour >= 14.25); 
        return isSingleWeek ? (isAfternoon ? "Turno A" : "Turno B") : (isAfternoon ? "Turno B" : "Turno A");
    }

    function updateShift() { turnoLabel.innerText = getActiveTurno(); }
    updateShift(); setInterval(updateShift, 60000);

    function startListening() {
        const id = lineaInput.value.trim().toLowerCase();
        if(!id) return;
        const savedLinea = localStorage.getItem('myActiveCall'); 
        db.ref('active_calls/' + id).off();
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || data.status === 'completed') {
                if (id === savedLinea) { localStorage.removeItem('myActiveCall'); }
                resetUI();
            } else if (id === savedLinea) {
                lineaInput.disabled = true; causaleSelect.disabled = true;
                if (data.status === 'orange') {
                    mainBtn.className = "main-btn status-orange locked";
                    statusText.innerText = "IN ATTESA..."; btnIcon.innerText = "⏳";
                    cancelBtn.style.display = "block";
                } else if (data.status === 'red' || data.status === 'finishing') {
                    mainBtn.className = "main-btn status-red locked";
                    statusText.innerText = "INTERVENTO IN CORSO..."; btnIcon.innerText = "⚙️";
                    cancelBtn.style.display = "none";
                }
            } else { resetUI(); }
        });
    }

    function resetUI() {
        mainBtn.className = "main-btn status-none"; statusText.innerText = "Chiamare Attrezzista"; btnIcon.innerText = "⚡️";
        mainBtn.classList.remove('locked'); cancelBtn.style.display = "none";
        lineaInput.disabled = false; causaleSelect.disabled = false;
    }

    function sendCall() {
        const id = lineaInput.value.trim().toLowerCase();
        const causale = causaleSelect.value;
        if(!id) { alert("INSERIRE LINEA!"); return; }
        const regex = /^[1-5]0[1-8](bis)?$/;
        if(!regex.test(id)) { alert("LINEA ERRATA!"); return; }
        if(!causale) { alert("SELEZIONA UNA CAUSALE!"); return; }
        
        db.ref('active_calls/' + id).once('value').then((snapshot) => {
            if (snapshot.exists() && snapshot.val().status !== 'completed') {
                alert("ATTENZIONE: Linea " + id.toUpperCase() + " è già attiva!");
                return; 
            }
            const currentTurno = getActiveTurno();
            db.ref('active_calls/' + id).set({
                startA: Date.now(), status: 'orange', causale: causale, turno: currentTurno
            }).then(() => {
                localStorage.setItem('myActiveCall', id);
                startListening();
                const tKey = currentTurno.replace(" ", "_");
                db.ref('tokens/' + tKey).once('value', (snap) => {
                    const tokens = snap.val() || {};
                    Object.values(tokens).forEach(t => {
                        if(!t) return;
                        const barkUrl = `https://api.day.app/${t}/⚠️ LINEA ${id.toUpperCase()}/Causale: ${causale}?sound=alarm&group=Luxottica&isArchive=1`;
                        fetch(barkUrl, { mode: 'no-cors', keepalive: true }).catch(() => {});
                    });
                });
            });
        });
    }

    function cancelCall() {
        const id = localStorage.getItem('myActiveCall');
        if (!id || !confirm("Annullare la chiamata per linea " + id.toUpperCase() + "?")) return;
        db.ref('active_calls/' + id).update({
            status: 'completed',
            endT: Date.now(),
            causale: "ANNULATO DA OPERATORE"
        }).then(() => {
            localStorage.removeItem('myActiveCall');
            resetUI();
        });
    }

    document.getElementById('curYear').innerText = new Date().getFullYear();
    const pLinea = localStorage.getItem('persistentLinea');
    if(pLinea) lineaInput.value = pLinea;
    const lastActive = localStorage.getItem('myActiveCall');
    if(lastActive) {
        lineaInput.value = lastActive;
        startListening();
    } else { startListening(); }
    lineaInput.addEventListener('blur', startListening);
</script>
</body>
</html>
