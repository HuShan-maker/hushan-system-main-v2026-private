<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='72' font-weight='900' fill='white'%3EA%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A - Operator Side v22.1</title>
    
    <!-- 核心脚本加载 -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; --black: #000000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; justify-content: space-around; 
            padding: calc(20px + env(safe-area-inset-top)) 25px calc(20px + env(safe-area-inset-bottom)) 25px;
        }

        .header { text-align: center; width: 100%; margin-top: 10px; }
        h1 { font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .input-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 10px 0; }
        .linea-row { display: flex; align-items: center; gap: 15px; }
        
        input { 
            width: 150px; padding: 12px; border-radius: 20px; 
            border: 3px solid var(--gray); font-size: 24px; font-weight: 900; 
            text-align: center; outline: none; background: #fff;
            -webkit-user-select: text; user-select: text; 
        }
        .turno-tag { font-size: 14px; font-weight: 800; color: #8e8e93; text-transform: uppercase; background: var(--gray); padding: 5px 10px; border-radius: 10px; }

        #causaleSelect {
            width: 220px; padding: 12px; border-radius: 15px;
            border: none; background: #f2f2f7; font-size: 15px;
            font-weight: 700; color: #3a3a3c; outline: none;
            cursor: pointer; appearance: none; -webkit-appearance: none;
            text-align: center;
        }

        .main-btn {
            width: 100%; max-width: 260px; height: 320px;    
            border-radius: 45px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08); cursor: pointer;
        }

        .status-none { background: #fff; border: 4px solid var(--gray); color: #000; }
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        .status-red { background: var(--red); color: #fff; }
        .locked { pointer-events: none; opacity: 0.9; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }

        .btn-icon { font-size: 60px; margin-bottom: 15px; }
        .btn-text { font-size: 17px; font-weight: 900; text-transform: uppercase; text-align: center; padding: 0 20px; }
        
        .footer-text { font-size: 10px; font-weight: 700; color: #8e8e93; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LINEA DI PRODUZIONE</h1>
    </div>

    <div class="input-container">
        <div class="linea-row">
            <input type="text" id="lineaInput" placeholder="NO." autocomplete="off">
            <div class="turno-tag" id="turnoLabel">TURNO --</div>
        </div>
        
        <select id="causaleSelect">
            <option value="" disabled selected>-- CAUSALE --</option>
            <option value="Faro">Faro</option>
            <option value="SGM Taglio">SGM Taglio</option>
            <option value="Avvitatore">Avvitatore</option>
            <option value="Lecureux">Lecureux</option>
            <option value="Stampiglia">Stampiglia</option>
            <option value="Oliatore">Oliatore</option>
        </select>
    </div>

    <button id="mainBtn" class="main-btn status-none" onclick="sendCall()">
        <div id="btnIcon" class="btn-icon">⚡️</div>
        <div id="statusText" class="btn-text">CHIAMARE ATTREZZISTA</div>
    </button>

    <div class="footer-text">© 2026 HU SHAN. ALL RIGHTS RESERVED.</div>

<script>
    // --- 配置信息 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 轮班计算逻辑
    function getActiveTurno() {
        const now = new Date();
        const hour = now.getHours() + (now.getMinutes() / 60);
        
        // 计算周数
        const startOfYear = new Date(now.getFullYear(), 0, 1);
        const pastDays = (now - startOfYear) / 86400000;
        const weekNum = Math.ceil((pastDays + startOfYear.getDay() + 1) / 7);
        
        const isAWeek = weekNum % 2 !== 0; // 单数周逻辑
        const isAfternoon = (hour >= 14.25); // 14:15之后

        if (isAWeek) {
            return isAfternoon ? "Turno A" : "Turno B";
        } else {
            return isAfternoon ? "Turno B" : "Turno A";
        }
    }

    function updateTurnoUI() {
        const turno = getActiveTurno();
        document.getElementById('turnoLabel').innerText = turno;
        return turno;
    }
    updateTurnoUI();
    setInterval(updateTurnoUI, 60000);

    // 全局变量
    const mainBtn = document.getElementById('mainBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');
    const causaleSelect = document.getElementById('causaleSelect');

    let currentId = localStorage.getItem('myLinea') || "";
    if(currentId) {
        lineaInput.value = currentId;
        startListening(currentId);
    }

    // 广播通知逻辑
    function sendBroadcastNotification(id, causale, currentTurno) {
        const turnoKey = currentTurno.replace(" ", "_"); // 转为 Turno_A 或 Turno_B
        const title = encodeURIComponent("⚠️ " + id.toUpperCase() + " [" + causale + "]");
        const body = encodeURIComponent("Richiesta da " + currentTurno);

        db.ref('tokens/' + turnoKey).once('value', (snapshot) => {
            const tokens = snapshot.val() || {};
            Object.values(tokens).forEach(token => {
                if(!token) return;
                const barkUrl = `https://api.day.app/${token}/${title}/${body}?sound=alarm&level=critical&group=Luxottica&isArchive=1`;
                fetch(barkUrl, { mode: 'no-cors', keepalive: true });
            });
        });
    }

    // 核心呼叫函数
    function sendCall() {
        const id = lineaInput.value.trim().toLowerCase();
        const causale = causaleSelect.value;
        const turno = getActiveTurno(); // 确保获取最新班次
        
        // 1. 验证输入
        if(!id) { alert("INSERIRE NUMERO LINEA!"); return; }
        if(!causale) { alert("SELEZIONA UNA CAUSALE!"); return; }
        
        const regex = /^[1-5]0[1-8](bis)?$/;
        if(!regex.test(id)) { 
            alert("FORMATO LINEA ERRATO!\nEsempio: 101, 101bis, 508"); 
            return; 
        }

        // 2. 保存并执行
        localStorage.setItem('myLinea', id);
        
        db.ref('active_calls/' + id).set({
            startA: Date.now(),
            status: 'orange',
            causale: causale,
            turno: turno
        }).then(() => {
            sendBroadcastNotification(id, causale, turno);
        }).catch(e => {
            alert("Errore Connessione: " + e.message);
        });
    }

    // 状态监听
    function startListening(id) {
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || data.status === 'completed') {
                setInitialUI();
                return;
            }
            causaleSelect.disabled = true;
            switch(data.status) {
                case 'orange':
                    mainBtn.className = "main-btn status-orange locked";
                    statusText.innerText = "IN ATTESA...";
                    btnIcon.innerText = "⏳";
                    break;
                case 'red':
                case 'finishing':
                    mainBtn.className = "main-btn status-red locked";
                    statusText.innerText = "INTERVENTO IN CORSO..."; 
                    btnIcon.innerText = "⚙️";
                    break;
            }
        });
    }

    function setInitialUI() {
        mainBtn.className = "main-btn status-none";
        statusText.innerText = "CHIAMARE ATTREZZISTA";
        btnIcon.innerText = "⚡️";
        mainBtn.classList.remove('locked');
        causaleSelect.disabled = false;
        causaleSelect.value = ""; // 重置选择
    }

    lineaInput.addEventListener('input', () => {
        const val = lineaInput.value.trim().toLowerCase();
        if(val.length >= 3) localStorage.setItem('myLinea', val);
    });
</script>
</body>
</html>
