<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>A - Operatore</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --btn-gray: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); padding: 20px; }
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }
        input { width: 100%; max-width: 280px; padding: 18px; border: 3px solid var(--btn-gray); border-radius: 20px; font-size: 24px; text-align: center; font-weight: 800; outline: none; margin-bottom: 30px; background: #f9f9f9; }
        input:focus { border-color: #000; background: #fff; }
        #mainBtn { width: 220px; height: 220px; border-radius: 50%; border: none; background: var(--btn-gray); font-size: 32px; font-weight: 900; color: #8e8e93; transition: 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; text-transform: uppercase; }
        #mainBtn.waiting { background: var(--orange); color: #fff; transform: scale(1.1); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,149,0,0.7); } 70% { box-shadow: 0 0 0 20px rgba(255,149,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,149,0,0); } }
        .status-text { margin-top: 20px; font-size: 14px; color: #8e8e93; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>ESSILORLUXOTTICA</h1>
    <input type="text" id="lineaInput" placeholder="LINEA" oninput="updateLinea()">
    <button id="mainBtn" onclick="sendCall()">INVIO</button>
    <div class="status-text" id="status">Premi per chiamare</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const inputEl = document.getElementById('lineaInput');
    const btnEl = document.getElementById('mainBtn');

    // 页面加载时恢复上次输入的 Linea
    window.onload = () => {
        const saved = localStorage.getItem('myLineaName');
        if (saved) {
            inputEl.value = saved;
            btnEl.innerText = saved;
            btnEl.style.color = "#000";
        }
    };

    function updateLinea() {
        const val = inputEl.value.trim().toUpperCase();
        if(val) {
            btnEl.innerText = val;
            btnEl.style.color = "#000";
            localStorage.setItem('myLineaName', val);
        } else {
            btnEl.innerText = "INVIO";
            btnEl.style.color = "#8e8e93";
        }
        btnEl.classList.remove('waiting');
        document.getElementById('status').innerText = "Premi per chiamare";
    }

    function sendCall() {
        const lineaID = inputEl.value.trim().toUpperCase();
        if(!lineaID) return alert("Inserire Linea!");
        
        btnEl.classList.add('waiting');
        document.getElementById('status').innerText = "Notifica inviata...";

        // 发送到云端数据库 (active_calls 路径)
        db.ref('active_calls/' + lineaID).set({
            status: 'orange',
            startA: Date.now()
        }).then(() => {
            document.getElementById('status').innerText = "Chiamata attiva su B e C";
            // 这里已经去掉了跳转 WhatsApp 的代码，实现静默呼叫
        });
    }
</script>
</body>
</html>
