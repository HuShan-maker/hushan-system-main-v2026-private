<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 桌面图标：黑底白字 A -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='72' font-weight='900' fill='white'%3EA%3C/text%3E%3C/svg%3E">

    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A - Operator Side v22.6</title>
    
    <!-- 加载 Firebase SDK (兼容模式) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; --black: #000000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; justify-content: space-around; 
            padding: calc(20px + env(safe-area-inset-top)) 25px calc(20px + env(safe-area-inset-bottom)) 25px;
        }

        .header { text-align: center; width: 100%; margin-top: 10px; }
        h1 { font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Linea 框和 Turno 组合布局 */
        .input-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 15px 0; }
        .linea-row { display: flex; align-items: center; gap: 15px; }
        
        input { 
            width: 150px; padding: 12px; border-radius: 20px; 
            border: 3px solid var(--gray); font-size: 24px; font-weight: 900; 
            text-align: center; outline: none; background: #fff;
            transition: border-color 0.3s;
            -webkit-user-select: text; user-select: text; 
        }
        input:focus { border-color: var(--orange); }

        .turno-tag { font-size: 13px; font-weight: 800; color: #8e8e93; text-transform: uppercase; background: var(--gray); padding: 6px 12px; border-radius: 12px; }

        /* Causale 下拉框样式 */
        #causaleSelect {
            width: 220px; padding: 12px; border-radius: 15px;
            border: none; background: var(--gray); font-size: 15px;
            font-weight: 700; color: #3a3a3c; outline: none;
            cursor: pointer; appearance: none; -webkit-appearance: none;
            text-align: center; transition: background-color 0.3s;
        }

        /* 主按钮样式 */
        .main-btn {
            width: 100%; max-width: 280px; height: 350px;    
            border-radius: 50px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer;
            position: relative;
        }

        .status-none { background: #fff; border: 5px solid var(--gray); color: #000; }
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        .status-red { background: var(--red); color: #fff; }

        .locked { pointer-events: none; transform: scale(0.96); opacity: 0.9; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }

        .btn-icon { font-size: 70px; margin-bottom: 20px; }
        .btn-text { font-size: 18px; font-weight: 900; text-transform: uppercase; text-align: center; padding: 0 25px; line-height: 1.3; }
        
        .footer-text { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LINEA DI PRODUZIONE</h1>
    </div>

    <div class="input-container">
        <div class="linea-row">
            <input type="text" id="lineaInput" placeholder="NO." autocomplete="off">
            <div class="turno-tag" id="turnoLabel">TURNO --</div>
        </div>
        
        <select id="causaleSelect">
            <option value="" disabled selected>-- SELEZIONA CAUSALE --</option>
            <option value="Faro">Faro</option>
            <option value="SGM Taglio">SGM Taglio</option>
            <option value="Avvitatore">Avvitatore</option>
            <option value="Lecureux">Lecureux</option>
            <option value="Stampiglia">Stampiglia</option>
            <option value="Oliatore">Oliatore</option>
        </select>
    </div>

    <button id="mainBtn" class="main-btn status-none" onclick="sendCall()">
        <div id="btnIcon" class="btn-icon">⚡️</div>
        <div id="statusText" class="btn-text">CHIAMARE ATTREZZISTA</div>
    </button>

    <div class="footer-text">© 2026 HU SHAN. ALL RIGHTS RESERVED.</div>

<script>
    // 1. Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const mainBtn = document.getElementById('mainBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');
    const causaleSelect = document.getElementById('causaleSelect');
    const turnoLabel = document.getElementById('turnoLabel');

    // 2. 班次自动对齐逻辑 (单数周 14:15 后为 A)
    function getActiveTurno() {
        const now = new Date();
        const hour = now.getHours() + (now.getMinutes() / 60);
        const start = new Date(now.getFullYear(), 0, 1);
        const week = Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        const isSingleWeek = week % 2 !== 0; 
        const isAfternoon = (hour >= 14.25); 

        if (isSingleWeek) return isAfternoon ? "Turno A" : "Turno B";
        return isAfternoon ? "Turno B" : "Turno A";
    }

    function updateShiftDisplay() { turnoLabel.innerText = getActiveTurno(); }
    updateShiftDisplay();
    setInterval(updateShiftDisplay, 60000);

    // 3. 核心监听函数
    function startListening() {
        const id = lineaInput.value.trim().toLowerCase();
        if(!id) return;
        localStorage.setItem('myLinea', id);
        
        db.ref('active_calls/' + id).off(); // 清除旧监听
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || data.status === 'completed') {
                resetUI();
            } else {
                causaleSelect.disabled = true;
                if (data.status === 'orange') {
                    mainBtn.className = "main-btn status-orange locked";
                    statusText.innerText = "IN ATTESA...";
                    btnIcon.innerText = "⏳";
                } else if (data.status === 'red' || data.status === 'finishing') {
                    mainBtn.className = "main-btn status-red locked";
                    statusText.innerText = "INTERVENTO IN CORSO...";
                    btnIcon.innerText = "⚙️";
                }
            }
        });
    }

    function resetUI() {
        mainBtn.className = "main-btn status-none";
        statusText.innerText = "CHIAMARE ATTREZZISTA";
        btnIcon.innerText = "⚡️";
        mainBtn.classList.remove('locked');
        causaleSelect.disabled = false;
        causaleSelect.style.backgroundColor = "var(--gray)";
    }

    // 4. 呼叫函数 (带三重校验)
    function sendCall() {
        const id = lineaInput.value.trim().toLowerCase();
        const causale = causaleSelect.value;
        const currentTurno = getActiveTurno();

        // [锁1] 检查是否为空
        if(!id) { alert("INSERIRE NUMERO LINEA!"); return; }

        // [锁2] 检查格式 (101-508, bis)
        const regex = /^[1-5]0[1-8](bis)?$/;
        if(!regex.test(id)) {
            alert("LINEA ERRATA!\nUsa il formato corretto (es: 101, 102bis, 508)");
            return;
        }

        // [锁3] 检查是否选择了原因
        if(!causale || causale === "") {
            alert("🔴 ATTENZIONE: Seleziona una CAUSALE!");
            causaleSelect.style.backgroundColor = "#ffcccc";
            return;
        }

        // 执行写入
        db.ref('active_calls/' + id).set({
            startA: Date.now(),
            status: 'orange',
            causale: causale,
            turno: currentTurno
        }).then(() => {
            // 写入成功后才启动本地监听
            startListening();
            
            // 触发群发广播
            const tKey = currentTurno.replace(" ", "_");
            db.ref('tokens/' + tKey).once('value', (snap) => {
                const tokens = snap.val() || {};
                Object.values(tokens).forEach(t => {
                    if(!t) return;
                    const url = `https://api.day.app/${t}/⚠️ LINEA ${id.toUpperCase()}/Causale: ${causale}?sound=alarm&group=Luxottica&isArchive=1`;
                    fetch(url, { mode: 'no-cors', keepalive: true });
                });
            });
        }).catch(e => alert("ERRORE DB: " + e.message));
    }

    // 5. 初始化与事件绑定
    const saved = localStorage.getItem('myLinea');
    if(saved) {
        lineaInput.value = saved;
        startListening();
    }

    lineaInput.addEventListener('blur', startListening);
    lineaInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') startListening(); });

    // 心跳连接：防止网络休眠
    setInterval(() => { if (db) { db.goOffline(); db.goOnline(); } }, 300000);

</script>
</body>
</html>
