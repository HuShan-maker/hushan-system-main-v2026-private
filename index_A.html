<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>A - Operatore Certified</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --btn-gray: #f2f2f7; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            height: 100vh; background: var(--bg); 
            padding: calc(40px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px; 
        }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

        h1 { font-size: 26px; font-weight: 900; margin-bottom: 50px; letter-spacing: -1px; }
        
        .input-container { width: 100%; max-width: 280px; margin-bottom: 80px; } /* 增加间距 */
        input { 
            width: 100%; padding: 18px; border: 3px solid var(--btn-gray); border-radius: 20px; 
            font-size: 24px; text-align: center; font-weight: 800; outline: none; 
            background: #f9f9f9; transition: 0.3s; -webkit-user-select: text; user-select: text;
        }
        
        #mainBtn { 
            width: 220px; height: 220px; border-radius: 50%; border: none; 
            background: var(--btn-gray); font-size: 32px; font-weight: 900; 
            color: #8e8e93; transition: 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            cursor: pointer; text-transform: uppercase; 
        }

        /* 状态样式 */
        #mainBtn.orange { background: var(--orange); color: #fff; animation: pulseO 1.5s infinite; }
        #mainBtn.red { background: var(--red); color: #fff; cursor: not-allowed; opacity: 0.9; }
        #mainBtn.invalid { background: #fee; color: #ff3b30; border: 2px dashed #ff3b30; font-size: 18px; cursor: not-allowed; }
        
        @keyframes pulseO { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .status-text { margin-top: 30px; font-size: 16px; font-weight: 800; text-transform: uppercase; min-height: 20px; }

        /* 版权文字样式 (同步 B 端) */
        .copy-text { text-align: center; font-size: 11px; color: #000000; margin-top: 20px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>

    <div class="container">
        <h1>ESSILORLUXOTTICA</h1>
        
        <div class="input-container">
            <input type="text" id="lineaInput" placeholder="LINEA" oninput="validateAndUpdate()">
        </div>

        <button id="mainBtn" onclick="sendCall()">INVIO</button>
        <div class="status-text" id="status">Pronto</div>
    </div>

    <div class="copy-text">© <span id="curYear"></span> Hu Shan. All rights reserved.</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const inputEl = document.getElementById('lineaInput');
    const btnEl = document.getElementById('mainBtn');
    const statusEl = document.getElementById('status');
    document.getElementById('curYear').innerText = new Date().getFullYear();

    // 生成合法名单：101-108, 101bis-108bis... 501-508bis
    const validLines = [];
    for(let p=1; p<=5; p++) {
        for(let n=1; n<=8; n++) {
            validLines.push(`${p}0${n}`);
            validLines.push(`${p}0${n}BIS`);
        }
    }

    let currentLinea = localStorage.getItem('myLineaName') || "";
    let firebaseListener = null;

    window.onload = () => {
        if (currentLinea) {
            inputEl.value = currentLinea;
            validateAndUpdate();
        }
    };

    function validateAndUpdate() {
        const val = inputEl.value.trim().toUpperCase();
        
        // 校验是否在合法名单内
        if (val === "") {
            btnEl.innerText = "INVIO";
            btnEl.className = "";
            btnEl.disabled = true;
            statusEl.innerText = "Inserire Linea";
            return;
        }

        if (!validLines.includes(val)) {
            btnEl.innerText = "LINEA ERRATA";
            btnEl.className = "invalid";
            btnEl.disabled = true;
            statusEl.innerText = "Formato non valido";
            statusEl.style.color = "red";
            return;
        }

        // 合法输入
        btnEl.innerText = val;
        btnEl.disabled = false;
        btnEl.className = "";
        statusEl.innerText = "Pronto";
        statusEl.style.color = "#8e8e93";
        localStorage.setItem('myLineaName', val);
        
        // 开启监听
        startListening(val);
    }

    function startListening(lineaID) {
        if (firebaseListener) firebaseListener.off(); // 移除旧监听

        firebaseListener = db.ref('active_calls/' + lineaID);
        firebaseListener.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                btnEl.className = "";
                btnEl.disabled = false;
                btnEl.innerText = lineaID;
                statusEl.innerText = "Pronto";
                inputEl.disabled = false;
            } else if (data.status === 'orange') {
                btnEl.className = "orange";
                btnEl.disabled = true;
                statusEl.innerText = "In Attesa...";
                inputEl.disabled = true;
            } else if (data.status === 'red') {
                btnEl.className = "red";
                btnEl.disabled = true;
                btnEl.innerText = "WORK";
                statusEl.innerText = "In Riparazione";
                inputEl.disabled = true;
            }
        });
    }

    function sendCall() {
        const val = inputEl.value.trim().toUpperCase();
        if(!validLines.includes(val)) return;
        
        db.ref('active_calls/' + val).set({
            status: 'orange',
            startA: Date.now()
        });
    }
</script>
</body>
</html>
