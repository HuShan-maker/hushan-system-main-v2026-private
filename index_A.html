<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>A - Operatore Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --btn-gray: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); padding: 20px; }
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }
        
        .input-container { width: 100%; max-width: 280px; margin-bottom: 40px; }
        input { width: 100%; padding: 18px; border: 3px solid var(--btn-gray); border-radius: 20px; font-size: 24px; text-align: center; font-weight: 800; outline: none; background: #f9f9f9; transition: 0.3s; }
        
        /* 核心按钮 */
        #mainBtn { 
            width: 220px; height: 220px; border-radius: 50%; border: none; 
            background: var(--btn-gray); font-size: 32px; font-weight: 900; 
            color: #8e8e93; transition: 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            cursor: pointer; text-transform: uppercase; 
        }

        /* 橙色：等待中 */
        #mainBtn.orange { background: var(--orange); color: #fff; animation: pulseO 1.5s infinite; }
        /* 红色：维修中（失效） */
        #mainBtn.red { background: var(--red); color: #fff; cursor: not-allowed; transform: scale(0.95); opacity: 0.9; }
        
        @keyframes pulseO { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .status-text { margin-top: 30px; font-size: 16px; font-weight: 800; text-transform: uppercase; }
        .disabled-hint { font-size: 12px; color: #8e8e93; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <h1>ESSILORLUXOTTICA</h1>
    <div class="input-container">
        <input type="text" id="lineaInput" placeholder="LINEA" oninput="updateLinea()">
    </div>
    <button id="mainBtn" onclick="sendCall()">INVIO</button>
    <div class="status-text" id="status">Pronto</div>
    <div id="hint" class="disabled-hint">Tecnico al lavoro... Attendere</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const inputEl = document.getElementById('lineaInput');
    const btnEl = document.getElementById('mainBtn');
    const statusEl = document.getElementById('status');
    const hintEl = document.getElementById('hint');

    let currentLinea = localStorage.getItem('myLineaName') || "";

    window.onload = () => {
        if (currentLinea) {
            inputEl.value = currentLinea;
            btnEl.innerText = currentLinea;
            startListening(currentLinea);
        }
    };

    function updateLinea() {
        const val = inputEl.value.trim().toUpperCase();
        if(val) {
            currentLinea = val;
            btnEl.innerText = val;
            btnEl.style.color = "#000";
            localStorage.setItem('myLineaName', val);
            startListening(val); // 切换监听的机台
        }
    }

    // --- 核心监听逻辑 ---
    function startListening(lineaID) {
        // 监听特定机台的状态
        db.ref('active_calls/' + lineaID).on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                // 数据库没记录：白色，可点击
                btnEl.className = "";
                btnEl.disabled = false;
                btnEl.innerText = lineaID || "INVIO";
                statusEl.innerText = "Pronto";
                statusEl.style.color = "#8e8e93";
                hintEl.style.display = "none";
                inputEl.disabled = false;
            } else if (data.status === 'orange') {
                // 等待中：橙色
                btnEl.className = "orange";
                btnEl.disabled = true; // 发送后进入等待，不可重复点
                statusEl.innerText = "In Attesa...";
                statusEl.style.color = "#ff9500";
                hintEl.style.display = "none";
                inputEl.disabled = true;
            } else if (data.status === 'red') {
                // 维修中：红色，失效
                btnEl.className = "red";
                btnEl.disabled = true;
                btnEl.innerText = "WORK";
                statusEl.innerText = "In Riparazione";
                statusEl.style.color = "#ff3b30";
                hintEl.style.display = "block";
                inputEl.disabled = true;
            }
        });
    }

    function sendCall() {
        if(!currentLinea) return alert("Inserire Linea!");
        
        db.ref('active_calls/' + currentLinea).set({
            status: 'orange',
            startA: Date.now()
        });
    }
</script>
</body>
</html>
