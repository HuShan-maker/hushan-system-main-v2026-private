<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 终极转义版图标：解决 iOS 不显示字母和底色的问题 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='60' font-weight='900' fill='white'%3EA%3C/text%3E%3C/svg%3E">

    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A - Operator Side v2.4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; --black: #000000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; justify-content: space-around; 
            padding: calc(40px + env(safe-area-inset-top)) 25px calc(20px + env(safe-area-inset-bottom)) 25px;
        }

        .header { text-align: center; width: 100%; }
        h1 { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .input-box { width: 100%; display: flex; justify-content: center; margin: 20px 0; }
        input { 
            width: 180px; padding: 15px; border-radius: 20px; 
            border: 3px solid var(--gray); font-size: 28px; font-weight: 900; 
            text-align: center; outline: none; background: #fff;
            transition: border-color 0.3s;
            -webkit-user-select: text; user-select: text; 
        }
        input:focus { border-color: var(--orange); }

        .main-btn {
            width: 100%; max-width: 300px; height: 400px;    
            border-radius: 50px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); cursor: pointer;
            position: relative; overflow: hidden;
        }

        .status-none { background: #fff; border: 5px solid var(--gray); color: #000; }
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        .status-red { background: var(--red); color: #fff; }

        .locked { pointer-events: none; transform: scale(0.96); }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

        .btn-icon { font-size: 80px; margin-bottom: 20px; transition: 0.3s; }
        .btn-text { font-size: 20px; font-weight: 900; text-transform: uppercase; text-align: center; padding: 0 30px; line-height: 1.3; }
        
        .footer-text { font-size: 11px; font-weight: 800; color: #000000; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LINEA DI PRODUZIONE</h1>
    </div>

    <div class="input-box">
        <input type="text" id="lineaInput" placeholder="NO." autocomplete="off" inputmode="text">
    </div>

    <button id="mainBtn" class="main-btn status-none" onclick="sendCall()">
        <div id="btnIcon" class="btn-icon">⚡️</div>
        <div id="statusText" class="btn-text">CHIAMARE ATTREZZISTA</div>
    </button>

    <div class="footer-text">© <span id="year">2026</span> HU SHAN. ALL RIGHTS RESERVED.</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const BARK_TOKEN = "t3WWfkPgH4KVC8axqhWBLR";

    document.getElementById('year').innerText = new Date().getFullYear();

    const mainBtn = document.getElementById('mainBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');

    let currentId = localStorage.getItem('myLinea') || "";

    if(currentId) {
        lineaInput.value = currentId;
        startListening(currentId);
    }

    function sendCall() {
        const id = lineaInput.value.trim().toLowerCase();
        if(!id) { alert("INSERIRE NUMERO LINEA!"); return; }
        const regex = /^[1-5]0[1-8](bis)?$/;
        if(!regex.test(id)) {
            alert("LINEA ERRATA!\nUsa formato: 101, 101bis, 508...");
            return;
        }
        localStorage.setItem('myLinea', id);
        currentId = id;
        
        db.ref('active_calls/' + id).set({
            startA: Date.now(),
            status: 'orange'
        }).then(() => {
            const title = encodeURIComponent("⚠️ CHIAMATA LINEA " + id.toUpperCase());
            const body = encodeURIComponent("Richiesta assistenza!");
            const barkUrl = `https://api.day.app/${BARK_TOKEN}/${title}/${body}?sound=glass&level=critical&group=Luxottica&isArchive=1`;
            
            fetch(barkUrl, { mode: 'no-cors', keepalive: true })
            .catch(e => console.log("Errore Bark:", e));

            startListening(id);
        }).catch(e => alert("Errore connessione: " + e.message));
    }

    function startListening(id) {
        db.ref('active_calls/' + id).off();
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || data.status === 'completed') {
                setInitialUI();
                return;
            }
            switch(data.status) {
                case 'orange':
                    mainBtn.className = "main-btn status-orange locked";
                    statusText.innerText = "IN ATTESA...";
                    btnIcon.innerText = "⏳";
                    break;
                case 'red':
                case 'finishing': 
                    mainBtn.className = "main-btn status-red locked";
                    statusText.innerText = "INTERVENTO IN CORSO..."; 
                    btnIcon.innerText = "⚙️";
                    break;
                default:
                    setInitialUI();
            }
        });
    }

    function setInitialUI() {
        mainBtn.className = "main-btn status-none";
        statusText.innerText = "CHIAMARE ATTREZZISTA";
        btnIcon.innerText = "⚡️";
        mainBtn.classList.remove('locked');
    }

    lineaInput.addEventListener('input', () => {
        const val = lineaInput.value.trim().toLowerCase();
        if(val.length >= 3) {
            localStorage.setItem('myLinea', val);
        }
    });

    let lastActive = Date.now();
    setInterval(() => {
        const now = Date.now();
        if (now - lastActive > 10000) { 
            db.goOffline(); 
            db.goOnline(); 
        }
        lastActive = now;
    }, 5000);
</script>
</body>
</html>
