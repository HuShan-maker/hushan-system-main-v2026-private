<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A - Operator Side</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; 
            padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom) 25px;
        }

        .header { padding: 25px 0 15px 0; text-align: center; width: 100%; }
        h1 { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; }

        .input-box { 
            width: 100%; 
            display: flex;
            justify-content: center;
            margin-bottom: 20px; 
        }
        input { 
            width: 180px; 
            padding: 12px; 
            border-radius: 16px; 
            border: 2px solid #eee; 
            font-size: 26px; 
            font-weight: 800; 
            text-align: center; 
            outline: none; 
            background: #fff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* 主按钮：紧凑尺寸 */
        .main-btn {
            width: 100%; 
            max-width: 280px; 
            height: 380px;    
            border-radius: 35px; 
            display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
        }

        .status-none { background: #fff; border: 4px solid var(--gray); color: #000; }
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        .status-red { background: var(--red); color: #fff; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-icon { font-size: 60px; margin-bottom: 15px; }
        .btn-text { font-size: 18px; font-weight: 900; text-transform: uppercase; text-align: center; padding: 0 20px; line-height: 1.2; }
        
        /* 底部版权样式：字体颜色已加深为纯黑 */
        .footer-text { 
            margin-top: auto; 
            padding: 15px 0; 
            font-size: 12px; 
            font-weight: 800; 
            color: #000000; /* 这里的颜色改为深黑色 */
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHIAMATA LINEA</h1>
    </div>

    <div class="input-box">
        <input type="text" id="lineaInput" placeholder="---" autocomplete="off">
    </div>

    <button id="mainBtn" class="main-btn status-none" onclick="sendCall()">
        <div id="btnIcon" class="btn-icon">⚡️</div>
        <div id="statusText" class="btn-text">CHIAMARE ATTREZZISTA</div>
    </button>

    <div class="footer-text">© <span id="year">2026</span> HU SHAN. ALL RIGHTS RESERVED.</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 动态年份
    document.getElementById('year').innerText = new Date().getFullYear();

    const validLines = [];
    [1, 2, 3, 4, 5].forEach(p => {
        for(let i=1; i<=8; i++) {
            validLines.push(`${p}0${i}`);
            validLines.push(`${p}0${i}bis`);
        }
    });

    const mainBtn = document.getElementById('mainBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');

    let currentId = localStorage.getItem('myLinea') || "";
    if(currentId) {
        lineaInput.value = currentId;
        startListening(currentId);
    }

    function sendCall() {
        const id = lineaInput.value.trim().toLowerCase();
        if(!id) return;
        if(!validLines.includes(id)) {
            alert("NUMERO LINEA ERRATO!\nInserire un numero da 101 a 508bis.");
            return;
        }
        localStorage.setItem('myLinea', id);
        currentId = id;
        db.ref('active_calls/' + id).set({
            startA: Date.now(),
            status: 'orange'
        });
        startListening(id);
    }

    function startListening(id) {
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) { setInitialUI(); return; }
            switch(data.status) {
                case 'orange':
                    mainBtn.className = "main-btn status-orange";
                    statusText.innerText = "IN ATTESA";
                    btnIcon.innerText = "⏳";
                    break;
                case 'red':
                    mainBtn.className = "main-btn status-red";
                    statusText.innerText = "RIPARAZIONE IN CORSO...";
                    btnIcon.innerText = "🛠";
                    break;
                case 'completed':
                    setInitialUI();
                    break;
                default:
                    setInitialUI();
            }
        });
    }

    function setInitialUI() {
        mainBtn.className = "main-btn status-none";
        statusText.innerText = "CHIAMARE ATTREZZISTA";
        btnIcon.innerText = "⚡️";
    }

    lineaInput.onchange = () => {
        const newId = lineaInput.value.trim().toLowerCase();
        if(newId && newId !== currentId) {
            db.ref('active_calls/' + currentId).off();
            currentId = newId;
            startListening(newId);
        }
    };
</script>
</body>
</html>
