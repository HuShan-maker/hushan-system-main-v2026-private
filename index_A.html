<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='72' font-weight='900' fill='white'%3EA%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LINEA DI PRODUZIONE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; --black: #000000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
            padding: env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 30px) 20px;
        }

        .header { text-align: center; width: 100%; flex-shrink: 0; margin-top: 5px; }
        h1 { font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .main-container {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            gap: 15px; width: 100%; max-width: 320px;
        }

        .input-card { 
            background: #fff; padding: 15px; border-radius: 35px; width: 100%;
            border: 4px solid var(--gray);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 12px;
        }

        .linea-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        input { 
            width: 140px; height: 50px; border-radius: 15px; 
            border: 3px solid var(--gray); font-size: 22px; font-weight: 900; 
            text-align: center; outline: none; background: #fff;
            -webkit-user-select: text; user-select: text; 
        }
        input:disabled { background-color: #f9f9fb; color: #8e8e93; border-color: #e5e5ea; }

        .turno-tag { 
            font-size: 9px; font-weight: 800; color: #8e8e93; text-transform: uppercase; 
            background: var(--gray); height: 50px; padding: 0 10px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; min-width: 65px;
        }

        #causaleSelect {
            width: 100%; height: 45px; border-radius: 12px;
            border: none; background: var(--gray); font-size: 13px;
            font-weight: 800; color: #3a3a3c; outline: none;
            cursor: pointer; text-align-last: center; -webkit-appearance: none;
        }

        /* 模态框内部检查框样式 */
        .check-area-modal {
            margin: 10px 0; padding: 12px; background: #fff9c4; border-radius: 20px; 
            width: 100%; border: 3px solid #fbc02d; transition: border-color 0.3s;
            text-align: left;
        }
        .check-flex-modal { display: flex; align-items: center; gap: 12px; }
        #checkPezziModal { width: 22px; height: 22px; flex-shrink: 0; accent-color: var(--black); }
        .check-label-modal { font-weight: 800; color: #000; font-size: 12px; line-height: 1.2; text-transform: uppercase; }

        .main-btn {
            width: 260px; height: 260px; border-radius: 55px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 12px 25px rgba(0,0,0,0.06); cursor: pointer;
            margin-top: 10px;
        }

        .status-none { background: #fff; border: 4px solid var(--gray); color: #000; }
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        .status-red { background: var(--red); color: #fff; }
        .locked { pointer-events: none; transform: scale(0.97); opacity: 0.9; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }

        .btn-icon { font-size: 60px; margin-bottom: 10px; }
        .btn-text { font-size: 15px; font-weight: 900; text-transform: uppercase; text-align: center; padding: 0 25px; line-height: 1.2; }

        #cancelBtn {
            margin-top: 15px; background: #fff; border: 2px solid #e5e5ea;
            color: #8e8e93; font-size: 12px; font-weight: 800; text-transform: uppercase;
            padding: 10px 25px; border-radius: 15px; display: none;
        }
        
        .feedback-entry-btn {
            background: var(--gray); color: var(--black); border: none; padding: 7px 18px;
            border-radius: 20px; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 10px; flex-shrink: 0;
        }
        .feedback-entry-btn:active { opacity: 0.7; transform: scale(0.95); }

        .copy-text { font-size: 10px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; margin-bottom: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #fff; width: 90%; max-width: 340px; border-radius: 30px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .modal-h2 { font-size: 18px; font-weight: 900; text-align: center; margin: 0; }
        .f-label { font-size: 11px; font-weight: 800; color: #8e8e93; margin-bottom: -10px; margin-left: 5px; text-transform: uppercase; }
        .f-select, .f-textarea, .f-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--gray); font-size: 15px; font-weight: 700; outline: none; -webkit-user-select: text; user-select: text; }
        .f-submit { background: var(--black); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; font-size: 14px; margin-top: 10px; }
        .f-close { color: #8e8e93; font-size: 12px; font-weight: 700; text-align: center; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>linea di produzione</h1>
    </div>

    <div class="main-container">
        <div class="input-card">
            <div class="linea-row">
                <input type="text" id="lineaInput" placeholder="NO." autocomplete="off" oninput="localStorage.setItem('persistentLinea', this.value)">
                <div class="turno-tag" id="turnoLabel">--</div>
            </div>
            
            <select id="causaleSelect">
                <option value="" disabled selected>-- SELEZIONA CAUSALE --</option>
                <option value="Faro">Faro</option>
                <option value="SGM Taglio">SGM Taglio</option>
                <option value="Avvitatore">Avvitatore</option>
                <option value="Lecureux">Lecureux</option>
                <option value="Stampiglia">Stampiglia</option>
                <option value="Oliatore">Oliatore</option>
                <option value="Cambio">Cambio</option>
            </select>
        </div>
        <div style="text-align: center; margin: 10px 0; padding: 0 15px; font-size: 11px; font-weight: 700; color: var(--orange); line-height: 1.3; text-transform: uppercase;">
            ⚠️ Avviso: Chiamare l'attrezzista 15 min prima del cambio modello per verifica attrezzatura.
        </div>
        <button id="mainBtn" class="main-btn status-none" onclick="initiateCall()">
            <div id="btnIcon" class="btn-icon">⚡️</div>
            <div id="statusText" class="btn-text">Chiamare Attrezzista</div>
        </button>
        <button id="cancelBtn" onclick="cancelCall()">Annulla Chiamata</button>
    </div>

    <button class="feedback-entry-btn" onclick="handleFeedbackOpen()">🎓 Crescita Tecnica</button>

    <div class="copy-text">© <span id="curYear"></span> HU SHAN · ALL RIGHTS RESERVED</div>

    <div id="modelloModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-h2">Cambio Modello</h2>
            <div class="f-label">Inserisci Modello</div>
            <input type="text" id="modelloInput" class="f-input" placeholder="" autocomplete="off">
            
            <div class="check-area-modal" id="checkWrapperModal">
                <div class="check-flex-modal">
                    <input type="checkbox" id="checkPezziModal">
                    <label for="checkPezziModal" class="modal-check-label">
                        Ho controllato tutti i componenti<br>
                        <span style="font-size: 9px; color: #666; font-weight: 700;">(aste, abbellitore, viti...)</span>
                    </label>
                </div>
            </div>

            <button class="f-submit" onclick="confirmModello()">CONFERMA E CHIAMA</button>
            <div class="f-close" onclick="cancelModelloModal()">ANNULLA</div>
        </div>
    </div>

    <div id="fModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-h2">Crescita Tecnica</h2>
            <div class="f-label">Attrezzista</div>
            <select id="fName" class="f-select">
                <option value="" disabled selected>-- Seleziona Nome --</option>
                <option value="Shan">Shan</option>
                <option value="Martina">Martina</option>
                <option value="Mirco">Mirco</option>
                <option value="Almir">Almir</option>
                <option value="Nortine">Nortine</option>
            </select>
            <div class="f-label">Competenza (1-5)</div>
            <input type="number" id="fScore" class="f-input" min="1" max="5" placeholder="Valuta da 1 a 5">
            <div class="f-label">Note / Suggerimenti</div>
            <textarea id="fNote" class="f-textarea" rows="3" placeholder="Come possiamo migliorare?"></textarea>
            <button class="f-submit" id="fSubmitBtn" onclick="submitFeedback()">INVIA FEEDBACK</button>
            <div class="f-close" onclick="document.getElementById('fModal').style.display='none'">CHIUDI</div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const mainBtn = document.getElementById('mainBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');
    const causaleSelect = document.getElementById('causaleSelect');
    const turnoLabel = document.getElementById('turnoLabel');

    function handleFeedbackOpen() {
        const now = new Date();
        const currentTime = now.getHours() + (now.getMinutes() / 60);
        if ((currentTime >= 12 && currentTime <= 14.25) || (currentTime >= 20 && currentTime <= 22.25)) {
            document.getElementById('fModal').style.display = 'flex';
        } else {
            alert("FUNZIONE NON ATTIVA.\n\nIl feedback è disponibile negli orari:\n- 12:00 - 14:15\n- 20:00 - 22:15");
        }
    }

    function submitFeedback() {
        const nameSelect = document.getElementById('fName');
        const score = document.getElementById('fScore').value;
        const note = document.getElementById('fNote').value;
        if(!nameSelect.value) { alert("Per favore, seleziona un attrezzista!"); return; }
        if(!score || score < 1 || score > 5) { alert("Inserisci un punteggio tra 1 e 5!"); return; }
        
        const btn = document.getElementById('fSubmitBtn');
        btn.disabled = true; btn.innerText = "Invio...";

        db.ref('feedbacks').push({
            attrezzista: nameSelect.value, punteggio: score, messaggio: note,
            timestamp: Date.now(), linea: lineaInput.value || "N/A", 
            data: new Date().toLocaleDateString('it-IT'), turno: getActiveTurno() 
        }).then(() => {
            alert("Feedback inviato!");
            document.getElementById('fModal').style.display = 'none';
            nameSelect.selectedIndex = 0; document.getElementById('fScore').value = ""; document.getElementById('fNote').value = "";
            btn.disabled = false; btn.innerText = "INVIA FEEDBACK";
        });
    }

    function getActiveTurno() {
        const now = new Date();
        const hour = now.getHours() + (now.getMinutes() / 60);
        const baseDate = new Date(2025, 11, 29, 0, 0, 0); 
        const msPerWeek = 7 * 24 * 60 * 60 * 1000;
        const totalWeeks = Math.floor((now.getTime() - baseDate.getTime()) / msPerWeek) + 1;
        const isAfternoon = (hour >= 14.25); 
        const isSingleWeek = totalWeeks % 2 !== 0; 
        return isSingleWeek ? (isAfternoon ? "Turno A" : "Turno B") : (isAfternoon ? "Turno B" : "Turno A");
    }

    function updateShift() { 
        const current = getActiveTurno();
        if (turnoLabel.innerText !== current) { turnoLabel.innerText = current; }
    }
    updateShift(); setInterval(updateShift, 10000);

        function startListening() {
        let id = lineaInput.value.trim().toLowerCase();
        const savedLinea = localStorage.getItem('myActiveCall');
        const myId = localStorage.getItem('myUniqueDeviceId'); // 获取自己的指纹
        
        if (!id && savedLinea) {
            id = savedLinea.toLowerCase();
            lineaInput.value = id.toUpperCase();
        }
        
        if(!id) return;

        db.ref('active_calls/' + id).off();
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            
            // 核心修复：如果是别人的任务 (senderId 不符)，我这里不进入橙色/红色锁定状态
            if (data && data.status !== 'completed' && data.senderId !== myId) {
                resetUI();
                statusText.innerText = "LINEA " + id.toUpperCase() + " GIÀ ATTIVA"; 
                return;
            }

            if (!data || data.status === 'completed') {
                if (id === localStorage.getItem('myActiveCall')) { 
                    localStorage.removeItem('myActiveCall'); 
                    resetUI();
                } else {
                    resetUI(); 
                }
            } else {
                const isMyTask = (id === localStorage.getItem('myActiveCall'));
                causaleSelect.disabled = true;

                if (data.status === 'orange' || data.status === 'purple') {
                    mainBtn.className = "main-btn status-orange locked";
                    statusText.innerText = isMyTask ? "IN ATTESA..." : "LINEA " + id.toUpperCase() + " GIÀ ATTIVA";
                    btnIcon.innerText = "⏳";
                    cancelBtn.style.display = isMyTask ? "block" : "none";
                    lineaInput.disabled = isMyTask; 

                } else if (data.status === 'red' || data.status === 'finishing') {
                    mainBtn.className = "main-btn status-red locked";
                    statusText.innerText = "INTERVENTO IN CORSO..."; 
                    btnIcon.innerText = "⚙️";
                    cancelBtn.style.display = "none";
                    lineaInput.disabled = isMyTask;
                }
            }
        });
    }

    function resetUI() {
        mainBtn.className = "main-btn status-none"; statusText.innerText = "Chiamare Attrezzista"; btnIcon.innerText = "⚡️";
        mainBtn.classList.remove('locked'); cancelBtn.style.display = "none";
        lineaInput.disabled = false; causaleSelect.disabled = false;
        causaleSelect.selectedIndex = 0; 
        document.getElementById('checkPezziModal').checked = false;
    }

    function initiateCall() {
        const id = lineaInput.value.trim().toLowerCase();
        const causale = causaleSelect.value;
        if(!id) { alert("INSERIRE LINEA!"); return; }
        const regex = /^[1-5]0[1-8](bis)?$/;
        if(!regex.test(id)) { alert("LINEA ERRATA!"); return; }
        if(!causale) { alert("SELEZIONA UNA CAUSALE!"); return; }

        if (causale === "Cambio") {
            document.getElementById('modelloModal').style.display = 'flex';
            setTimeout(() => document.getElementById('modelloInput').focus(), 150);
        } else {
            sendCall(causale);
        }
    }

    function confirmModello() {
        const modello = document.getElementById('modelloInput').value.trim();
        const isChecked = document.getElementById('checkPezziModal').checked;
        if (!modello) { alert("INSERIRE MODELLO!"); return; }
        if (!isChecked) {
            alert("DEVI CONFERMARE DI AVER CONTROLLATO TUTTI I COMPONENTI!");
            document.getElementById('checkWrapperModal').style.borderColor = "#ff3b30";
            setTimeout(() => { document.getElementById('checkWrapperModal').style.borderColor = "#fbc02d"; }, 500);
            return;
        }
        sendCall("Cambio " + modello.toUpperCase());
        document.getElementById('modelloModal').style.display = 'none';
        document.getElementById('modelloInput').value = "";
    }

    function cancelModelloModal() {
        const id = lineaInput.value.trim().toLowerCase();
        if(id) {
            const now = Date.now();
            const dateKey = new Date().toISOString().split('T')[0];
            db.ref(`history/${dateKey}/${id}_${now}`).set({
                linea: id.toUpperCase(), causale: "ANNULLATO DA LINEA", status: 'completed', timestamp: now, turno: getActiveTurno()
            });
        }
        document.getElementById('modelloModal').style.display = 'none';
        resetUI();
    }
        function sendCall(finalCausale) {
        const id = lineaInput.value.trim().toLowerCase();
        
        // 生成手机指纹，确保唯一性
        let myId = localStorage.getItem('myUniqueDeviceId');
        if(!myId) { 
            myId = 'DEV_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('myUniqueDeviceId', myId);
        }

        db.ref('active_calls/' + id).once('value').then((snapshot) => {
            if (snapshot.exists() && snapshot.val().status !== 'completed') {
                alert("ATTENZIONE: Linea " + id.toUpperCase() + " è già attiva!"); return; 
            }
            db.ref('active_calls/' + id).set({
                startA: Date.now(), 
                status: 'orange', 
                causale: finalCausale, 
                turno: getActiveTurno(),
                senderId: myId // 记录是谁叫的
            }).then(() => {
                localStorage.setItem('myActiveCall', id); 
                startListening();
                const tKey = getActiveTurno().replace(" ", "_");
                db.ref('tokens/' + tKey).once('value', (snap) => {
                    const tokens = snap.val() || {};
                    Object.values(tokens).forEach(t => {
                        if(!t) return;
                        const barkUrl = `https://api.day.app/${t}/⚠️ LINEA ${id.toUpperCase()}/Causale: ${finalCausale}?sound=alarm&group=Luxottica&isArchive=1`;
                        fetch(barkUrl, { mode: 'no-cors', keepalive: true }).catch(() => {});
                    });
                });
            });
        });
    }

        function cancelCall() {
        const id = localStorage.getItem('myActiveCall');
        if (!id || !confirm("Annullare la chiamata per linea " + id.toUpperCase() + "?")) return;
        
        const now = Date.now();
        const dateKey = new Date().toISOString().split('T')[0];
        
        db.ref('active_calls/' + id).once('value').then(snap => {
            const data = snap.val();
            if (!data) return; // 如果数据已经没了，直接退出

            // --- 核心修复：手动构造一个完整的归档数据 ---
            const archiveData = {
                id: id.toUpperCase(),
                startA: data.startA || now,
                startB: now, // 强制让 B 时间等于现在，防止 C 端计算出错
                endT: now,   // 强制让结束时间等于现在
                status: 'completed',
                causale: "ANNULLATO DA LINEA",
                techName: "-", // 标记是客户端自己取消的
                turno: getActiveTurno()
            };

            // 1. 先存入历史记录
            db.ref(`history/${dateKey}/${id}_${now}`).set(archiveData).then(() => {
                // 2. 存入成功后，再删除实时呼叫
                db.ref('active_calls/' + id).remove().then(() => { 
                    localStorage.removeItem('myActiveCall'); 
                    resetUI(); 
                });
            });
        });
    }


    document.getElementById('curYear').innerText = new Date().getFullYear();
    const pLinea = localStorage.getItem('persistentLinea');
    if(pLinea) lineaInput.value = pLinea;
    const lastActive = localStorage.getItem('myActiveCall');
    if(lastActive) { lineaInput.value = lastActive; startListening(); } else { startListening(); }
    lineaInput.addEventListener('blur', startListening);
</script>
</body>
</html>
