<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>A - Operatore (Fix)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --btn-gray: #f2f2f7; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: env(safe-area-inset-top) 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: var(--bg); overflow: hidden;
        }

        h1 { font-size: 26px; font-weight: 900; margin-bottom: 50px; letter-spacing: -1px; color: #000; }

        /* 输入框容器 */
        .input-container { width: 100%; max-width: 280px; margin-bottom: 40px; }
        input { 
            width: 100%; padding: 18px; border: 3px solid var(--btn-gray); border-radius: 20px;
            font-size: 24px; text-align: center; font-weight: 800; outline: none; 
            transition: 0.3s; background: #f9f9f9;
            -webkit-user-select: text; user-select: text; /* 允许输入文字 */
        }
        input:focus { border-color: #000; background: #fff; }

        /* 呼叫大按钮 */
        #mainBtn {
            width: 220px; height: 220px; border-radius: 50%;
            border: none; background: var(--btn-gray);
            font-size: 32px; font-weight: 900; color: #8e8e93;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-transform: uppercase;
        }

        /* 激活状态（橙色闪烁） */
        #mainBtn.waiting {
            background: var(--orange);
            color: #fff;
            transform: scale(1.1);
            animation: pulseOrange 1.5s infinite;
        }

        @keyframes pulseOrange {
            0% { box-shadow: 0 0 0 0 rgba(255,149,0,0.7); }
            70% { box-shadow: 0 0 0 25px rgba(255,149,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,149,0,0); }
        }

        .status-text { margin-top: 30px; font-size: 14px; color: #8e8e93; font-weight: 700; text-transform: uppercase; }
        .hint { margin-top: 10px; font-size: 11px; color: #c7c7cc; }
    </style>
</head>
<body>

    <h1>ESSILORLUXOTTICA</h1>

    <div class="input-container">
        <input type="text" id="lineaInput" placeholder="LINEA" oninput="updateLinea()">
    </div>

    <button id="mainBtn" onclick="sendCall()">INVIO</button>

    <div class="status-text" id="status">Premi per chiamare</div>
    <div class="hint">Il numero linea verrà memorizzato</div>

<script>
    // --- 1. FIREBASE 配置 (请确保此处配置与你 B端一致) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. 初始化加载逻辑 ---
    const inputEl = document.getElementById('lineaInput');
    const btnEl = document.getElementById('mainBtn');

    // 页面加载时：从本地读取之前存过的机台号
    window.onload = () => {
        const savedLinea = localStorage.getItem('myLineaName');
        if (savedLinea) {
            inputEl.value = savedLinea;
            btnEl.innerText = savedLinea;
            btnEl.style.color = "#000";
        }
    };

    // 输入时：实时同步按钮文字并保存到本地
    function updateLinea() {
        const val = inputEl.value.trim().toUpperCase();
        if(val) {
            btnEl.innerText = val;
            btnEl.style.color = "#000";
            localStorage.setItem('myLineaName', val); // 永久保存在这台手机上
        } else {
            btnEl.innerText = "INVIO";
            btnEl.style.color = "#8e8e93";
        }
        // 修改内容时取消橙色状态，方便重新发送
        btnEl.classList.remove('waiting');
        document.getElementById('status').innerText = "Premi per chiamare";
    }

    // --- 3. 发送呼叫逻辑 ---
    function sendCall() {
        const lineaID = inputEl.value.trim().toUpperCase();
        if(!lineaID) {
            alert("Inserire numero linea!");
            return;
        }

        // 按钮变橙色
        btnEl.classList.add('waiting');
        document.getElementById('status').innerText = "Chiamata inviata...";

        // 同步到 Firebase 数据库
        db.ref('active_calls/' + lineaID).set({
            status: 'orange',
            startA: Date.now()
        }).then(() => {
            // 触发 WhatsApp
            const msg = `🚨 *CHIAMATA ATTREZZISTA*\n📍 Linea: *${lineaID}*\nStatus: IN ATTESA (Orange)`;
            const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
            
            setTimeout(() => {
                window.location.href = waUrl;
            }, 600);
        });
    }
</script>
</body>
</html>
