<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>A - Operatore Sync Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --btn-gray: #f2f2f7; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; background: var(--bg); 
            padding: calc(40px + env(safe-area-inset-top)) 20px 20px 20px; 
        }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

        h1 { font-size: 26px; font-weight: 900; margin-bottom: 50px; letter-spacing: -1px; }
        
        .input-container { width: 100%; max-width: 280px; margin-bottom: 80px; }
        input { 
            width: 100%; padding: 18px; border: 3px solid var(--btn-gray); border-radius: 20px; 
            font-size: 24px; text-align: center; font-weight: 800; outline: none; 
            background: #f9f9f9; transition: 0.3s; -webkit-user-select: text; user-select: text;
        }
        
        #mainBtn { 
            width: 220px; height: 220px; border-radius: 50%; border: none; 
            background: var(--btn-gray); font-size: 32px; font-weight: 900; 
            color: #8e8e93; transition: 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            cursor: pointer; text-transform: uppercase; 
        }

        /* 状态控制 */
        #mainBtn.orange { background: var(--orange) !important; color: #fff !important; animation: pulseO 1.5s infinite; }
        #mainBtn.red { background: var(--red) !important; color: #fff !important; cursor: not-allowed; }
        #mainBtn.invalid { background: #fee; color: #ff3b30; border: 2px dashed #ff3b30; font-size: 18px; }
        
        @keyframes pulseO { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .status-text { margin-top: 30px; font-size: 16px; font-weight: 800; text-transform: uppercase; color: #8e8e93; }

        /* 版权底部 - 强制固定 */
        .footer { width: 100%; padding: 20px 0; margin-top: auto; }
        .copy-text { text-align: center; font-size: 11px; color: #000000; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>ESSILORLUXOTTICA</h1>
        
        <div class="input-container">
            <input type="text" id="lineaInput" placeholder="LINEA" oninput="handleTyping()">
        </div>

        <button id="mainBtn" onclick="sendCall()">INVIO</button>
        <div class="status-text" id="status">Pronto</div>
    </div>

    <div class="footer">
        <div class="copy-text">© <span id="curYear"></span> Hu Shan. All rights reserved.</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const inputEl = document.getElementById('lineaInput');
    const btnEl = document.getElementById('mainBtn');
    const statusEl = document.getElementById('status');
    document.getElementById('curYear').innerText = new Date().getFullYear();

    // 生成合法列表
    const validLines = [];
    for(let p=1; p<=5; p++) {
        for(let n=1; n<=8; n++) {
            validLines.push(`${p}0${n}`);
            validLines.push(`${p}0${n}BIS`);
        }
    }

    let currentListener = null;

    window.onload = () => {
        const saved = localStorage.getItem('myLineaName');
        if (saved) {
            inputEl.value = saved;
            checkAndListen(saved);
        }
    };

    function handleTyping() {
        const val = inputEl.value.trim().toUpperCase();
        if (val === "") {
            btnEl.innerText = "INVIO";
            btnEl.className = "";
            statusEl.innerText = "Inserire Linea";
            return;
        }
        checkAndListen(val);
    }

    function checkAndListen(val) {
        if (!validLines.includes(val)) {
            btnEl.innerText = "LINEA ERRATA";
            btnEl.className = "invalid";
            statusEl.innerText = "Non Valido";
            return;
        }

        // 合法输入
        btnEl.innerText = val;
        btnEl.className = "";
        statusEl.innerText = "Pronto";
        localStorage.setItem('myLineaName', val);

        // 开启监听，但只有数据库有值时才变色
        if (currentListener) currentListener.off();
        currentListener = db.ref('active_calls/' + val);
        currentListener.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                btnEl.className = "";
                btnEl.disabled = false;
                btnEl.innerText = val;
                statusEl.innerText = "Pronto";
                inputEl.disabled = false;
            } else {
                btnEl.className = data.status; // orange 或 red
                btnEl.disabled = true;
                btnEl.innerText = (data.status === 'red') ? "WORK" : val;
                statusEl.innerText = (data.status === 'red') ? "In Riparazione" : "In Attesa...";
                inputEl.disabled = true;
            }
        });
    }

    function sendCall() {
        const val = inputEl.value.trim().toUpperCase();
        if(!validLines.includes(val)) return;
        
        // 只有在这里点击，才会向数据库写入
        db.ref('active_calls/' + val).set({
            status: 'orange',
            startA: Date.now()
        });
    }
</script>
</body>
</html>
